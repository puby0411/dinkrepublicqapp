            <div key={court.id} className={`court-card ${court.players ? 'active' : 'open'}`}>
              <div className="court-header">
                <span className="court-name">
                  <span className={`court-status-dot ${court.players?'dot-green':'dot-gray'}`}></span>
                  Court {court.id}
                </span>
                {court.players
                  ? <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:2}}>
                      <CourtTimer startTime={court.startTime} limitMin={gameTime} />
                      {(() => {
                        const all = [...court.players.teamA, ...court.players.teamB];
                        const fCount = all.filter(p => p.gender === 'F').length;
                        if (matchMode === 'Open Level') return <span style={{fontSize:9,fontWeight:800,color:'var(--gold)',letterSpacing:.5,textTransform:'uppercase'}}>⚡ Open Levels</span>;
                        if (fCount === 2) return <span style={{fontSize:9,fontWeight:800,color:'#f06292',letterSpacing:.5,textTransform:'uppercase'}}>♀♂ Mixed Doubles</span>;
                        if (fCount === 4) return <span style={{fontSize:9,fontWeight:800,color:'#f06292',letterSpacing:.5,textTransform:'uppercase'}}>♀ Women's Doubles</span>;
                        return <span style={{fontSize:9,fontWeight:800,color:'#64b5f6',letterSpacing:.5,textTransform:'uppercase'}}>♂ Men's Doubles</span>;
                      })()}
                    </div>
                  : <span style={{fontSize:11,color:'var(--text-dim)'}}>OPEN</span>
                }
              </div>

              {court.players ? (
                <>
                  {/* Rearrange mode toggle hint */}
                  {rearrangeCourt === court.id ? (
                    <div style={{fontSize:11,color:'var(--gold)',fontWeight:700,textAlign:'center',background:'var(--gold-dim)',borderRadius:6,padding:'5px 8px',border:'1px solid var(--gold)55',marginBottom:2}}>
                      ↕ Drag players to swap · <button onClick={() => { setRearrangeCourt(null); setDragPlayerId(null); }} style={{background:'none',border:'none',color:'var(--gold)',cursor:'pointer',fontWeight:800,fontSize:11,padding:0,textDecoration:'underline'}}>Done</button>
                    </div>
                  ) : null}

                  {/* Render teams — draggable when rearrange mode is on */}
                  {[
                    { label: '— TEAM A —', players: court.players.teamA, team: 'A' },
                    { label: '— VS —', players: null },
                    { label: '— TEAM B —', players: court.players.teamB, team: 'B' },
                  ].map((section, si) => (
                    section.players === null
                      ? (() => {
                          // Show opponent repeat count between teams
                          const oppRepeats = court.players.teamA.flatMap(pA =>
                            court.players.teamB.map(pB => phGet(pA.id, pB.id))
                          ).reduce((a,b) => a+b, 0);
                          return (
                            <div key="vs" className="team-divider" style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                              — VS —
                              {oppRepeats > 0 && (
                                <span title={`These 4 have faced each other ${oppRepeats} time${oppRepeats!==1?'s':''} before`}
                                  style={{fontSize:9,fontWeight:800,background:'var(--orange-dim)',color:'var(--orange)',borderRadius:10,padding:'1px 5px',border:'1px solid var(--orange)44'}}>
                                  ×{oppRepeats}
                                </span>
                              )}
                            </div>
                          );
                        })()
                      : <React.Fragment key={section.team}>
                          <div className="team-divider" style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                            {section.label}
                            {(() => {
                              const [p0, p1] = section.players;
                              if (!p0 || !p1) return null;
                              const partnerRepeats = phGet(p0.id, p1.id);
                              return partnerRepeats > 0
                                ? <span title={`${p0.name} & ${p1.name} have been partners ${partnerRepeats} time${partnerRepeats!==1?'s':''} before`}
                                    style={{fontSize:9,fontWeight:800,background:'var(--blue-dim)',color:'var(--blue)',borderRadius:10,padding:'1px 5px',border:'1px solid var(--blue)44'}}>
                                    🔁×{partnerRepeats}
                                  </span>
                                : null;
                            })()}
                          </div>
                          {section.players.map(p => {
                            const isBeingDragged = dragPlayerId === p.id;
                            const isRearranging = rearrangeCourt === court.id;
                            const isDropTarget = isRearranging && dragPlayerId && dragPlayerId !== p.id;
                            const isBeingReplaced = replacingPlayer?.courtId === court.id && replacingPlayer?.playerId === p.id;
                            return (
                              <React.Fragment key={p.id}>
                                <div
                                  className="player-slot"
                                  draggable={isRearranging}
                                  onDragStart={isRearranging ? () => setDragPlayerId(p.id) : undefined}
                                  onDragEnd={isRearranging ? () => setDragPlayerId(null) : undefined}
                                  onDragOver={isDropTarget ? (e) => e.preventDefault() : undefined}
                                  onDrop={isDropTarget ? (e) => {
                                    e.preventDefault();
                                    swapCourtPlayers(court.id, dragPlayerId, p.id);
                                    setDragPlayerId(null);
                                  } : undefined}
                                  onClick={!isRearranging && !replacingPlayer ? () => setRearrangeCourt(court.id) : undefined}
                                  title={!isRearranging ? 'Click to rearrange players' : isDropTarget ? `Swap with ${p.name}` : 'Drag me'}
                                  style={{
                                    cursor: isRearranging ? (isBeingDragged ? 'grabbing' : 'grab') : 'pointer',
                                    opacity: isBeingDragged ? 0.45 : 1,
                                    border: isBeingReplaced
                                      ? '2px dashed var(--red)'
                                      : isDropTarget
                                        ? '2px dashed var(--gold)'
                                        : isRearranging
                                          ? '1px dashed var(--teal)'
                                          : undefined,
                                    background: isBeingReplaced ? 'var(--red-dim)' : undefined,
                                    transition: 'border 0.15s, opacity 0.15s, background 0.15s',
                                    userSelect: 'none',
                                  }}
                                >
                                  <GenderTag gender={p.gender} />
                                  <LevelBadge level={p.level} />
                                  <span className="player-name" style={{color: isBeingReplaced ? 'var(--red)' : undefined}}>{p.name}</span>
                                  {p.partnerId && section.players.find(x => x.id === p.partnerId) && (
                                    <span style={{fontSize:9,color:'#ce93d8'}}>🔗</span>
                                  )}
                                  {isRearranging && <span style={{marginLeft:'auto',fontSize:12,color:'var(--teal)',opacity:0.7}}>⠿</span>}
                                  {/* Sub-out buttons: ⚡ auto-fill  |  ✕ manual picker */}
                                  {!isRearranging && (
                                    <div style={{display:'flex',gap:3,marginLeft:'auto',flexShrink:0}}>
                                      <button
                                        title={'Auto-remove ' + p.name + ' and fill from queue (algorithm pick)'}
                                        onClick={e => {
                                          e.stopPropagation();
                                          setReplacingPlayer(null);
                                          autoRemoveAndReplace(court.id, p.id);
                                        }}
                                        style={{
                                          background:'var(--orange-dim)',
                                          border:'1px solid var(--orange)55',
                                          borderRadius:4,
                                          color:'var(--orange)',
                                          fontSize:10,
                                          fontWeight:900,
                                          cursor: queue.length === 0 ? 'not-allowed' : 'pointer',
                                          padding:'2px 6px',
                                          lineHeight:1.4,
                                          flexShrink:0,
                                          opacity: queue.length === 0 ? 0.3 : 1,
                                          transition:'all 0.15s',
                                        }}
                                        disabled={queue.length === 0}
                                      >&#9889;</button>
                                      <button
                                        title={'Manually choose sub for ' + p.name}
                                        onClick={e => {
                                          e.stopPropagation();
                                          setReplacingPlayer(
                                            replacingPlayer?.playerId === p.id
                                              ? null
                                              : { courtId: court.id, playerId: p.id }
                                          );
                                          setRearrangeCourt(null);
                                        }}
                                        style={{
                                          background: isBeingReplaced ? 'var(--red)' : 'transparent',
                                          border: '1px solid ' + (isBeingReplaced ? 'var(--red)' : 'var(--border)'),
                                          borderRadius:4,
                                          color: isBeingReplaced ? '#fff' : 'var(--red)',
                                          fontSize:11,
                                          fontWeight:800,
                                          cursor:'pointer',
                                          padding:'2px 5px',
                                          lineHeight:1.4,
                                          flexShrink:0,
                                          transition:'all 0.15s',
                                        }}
                                      >&#10005;</button>
                                    </div>
                                  )}
                                </div>

                                {/* Manual sub-in picker */}
                                {isBeingReplaced && (
                                  <div style={{background:'var(--surface)',border:'1px solid var(--red)',borderRadius:8,padding:'10px',marginBottom:4}}>
                                    <div style={{fontSize:11,fontWeight:700,color:'var(--red)',marginBottom:2}}>
                                      Manually sub out <strong>{p.name}</strong>:
                                    </div>
                                    <div style={{fontSize:10,color:'var(--text-dim)',marginBottom:8}}>
                                      Tip: use <span style={{color:'var(--orange)',fontWeight:900}}>&#9889;</span> for smart auto-fill from queue
                                    </div>
                                    {queue.length === 0
                                      ? <div style={{fontSize:11,color:'var(--text-dim)',textAlign:'center',padding:'8px 0'}}>No players in queue</div>
                                      : <div style={{display:'flex',flexDirection:'column',gap:4,maxHeight:160,overflowY:'auto'}}>
                                          {queue.map(qp => (
                                            <div
                                              key={qp.id}
                                              onClick={() => replaceCourtPlayer(court.id, p.id, qp)}
                                              style={{
                                                display:'flex',alignItems:'center',gap:6,
                                                padding:'6px 8px',borderRadius:6,
                                                border:'1px solid var(--border)',
                                                background:'var(--surface2)',
                                                cursor:'pointer',fontSize:12,
                                                transition:'all 0.15s',
                                              }}
                                              onMouseOver={e => { e.currentTarget.style.borderColor='var(--green)'; e.currentTarget.style.background='var(--green-dim)'; }}
                                              onMouseOut={e => { e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.background='var(--surface2)'; }}
                                            >
                                              <GenderTag gender={qp.gender} />
                                              <LevelBadge level={qp.level} />
                                              <span style={{fontWeight:600,flex:1}}>{qp.name}</span>
                                              <span style={{fontSize:10,color:'var(--text-muted)'}}>🎮 {playerStats[qp.id]?.games || 0}g</span>
                                            </div>
                                          ))}
                                        </div>
                                    }
                                    <button
                                      onClick={() => setReplacingPlayer(null)}
                                      style={{marginTop:8,width:'100%',background:'transparent',border:'1px solid var(--border)',borderRadius:6,color:'var(--text-muted)',fontSize:11,fontWeight:600,padding:'5px',cursor:'pointer'}}
                                    >Cancel</button>
                                  </div>
                                )}
                              </React.Fragment>
                            );
                          })}
                        </React.Fragment>
                  ))}

                  <div style={{fontSize:9,color:'var(--text-dim)',marginBottom:4,textAlign:'right',lineHeight:1.6}}>
                    <span style={{color:'var(--orange)',fontWeight:900}}>&#9889;</span>{' '}auto-fill &nbsp;&middot;&nbsp; <span style={{color:'var(--red)',fontWeight:700}}>&#10005;</span>{' '}manual sub
                  </div>
                  <div className="court-action-row">
                    {rearrangeCourt !== court.id && (
                      <button className="btn btn-ghost btn-sm" onClick={() => { setRearrangeCourt(court.id); setDragPlayerId(null); setReplacingPlayer(null); }} title="Rearrange players by dragging">&#8645; Rearrange</button>
                    )}
                    <button className="btn btn-red btn-sm" style={{flex:1}} onClick={() => { setRearrangeCourt(null); endGame(court.id); }}>End &amp; Score</button>
                  </div>
                </>
              ) : (
                <>
                  {[0,1,2,3].map(i => <div key={i} className="player-slot empty">open slot</div>)}
                  {matchMode === 'Manual' && queue.length >= 4 && (
                    manualCourt === court.id ? (
                      <div style={{marginTop:8}}>
                        <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:6}}>
                          Pick 4 players ({manualSelected.length}/4) — first 2 = Team A, last 2 = Team B
                        </div>
                        {/* Search box */}
                        <div style={{position:'relative',marginBottom:8}}>
                          <span style={{position:'absolute',left:8,top:'50%',transform:'translateY(-50%)',fontSize:12,color:'var(--text-dim)',pointerEvents:'none'}}>🔍</span>
                          <input
                            type="text"
                            placeholder="Search player…"
                            value={manualSearch}
                            onChange={e => setManualSearch(e.target.value)}
                            style={{paddingLeft:28,fontSize:12,background:'var(--surface3)',border:'1px solid var(--border)',borderRadius:6,color:'#e8f0fe',width:'100%'}}
                          />
                          {manualSearch && (
                            <button onClick={() => setManualSearch('')} style={{position:'absolute',right:6,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--text-dim)',cursor:'pointer',fontSize:13,lineHeight:1,padding:0}}>✕</button>
                          )}
                        </div>
                        <div className="player-select-grid">
                          {queue
                            .filter(p => !manualSearch.trim() || p.name.toLowerCase().includes(manualSearch.trim().toLowerCase()))
                            .map(p => (
                              <div key={p.id}
                                className={`player-select-item ${manualSelected.find(x=>x.id===p.id)?'selected':''}`}
                                onClick={() => toggleManualPlayer(p)}>
                                <GenderTag gender={p.gender} /><LevelBadge level={p.level} /> {p.name}
                              </div>
                            ))
                          }
                          {queue.filter(p => !manualSearch.trim() || p.name.toLowerCase().includes(manualSearch.trim().toLowerCase())).length === 0 && (
                            <div style={{gridColumn:'1/-1',fontSize:11,color:'var(--text-dim)',textAlign:'center',padding:8}}>No players match "{manualSearch}"</div>
                          )}
                        </div>
                        <div style={{display:'flex',gap:6}}>
                          <button className="btn btn-green btn-sm" style={{flex:1}} onClick={confirmManual}>Start Game</button>
                          <button className="btn btn-ghost btn-sm" onClick={() => { setManualCourt(null); setManualSearch(''); }}>Cancel</button>
                        </div>
                      </div>
                    ) : (
                      <button className="btn btn-blue btn-sm" style={{width:'100%',marginTop:8}} onClick={() => startManual(court.id)}>
                        Assign Manually
                      </button>
                    )
                  )}
                  {matchMode !== 'Manual' && queue.length >= 4 && (
                    <button className="btn btn-ghost btn-sm" style={{width:'100%',marginTop:8}} onClick={() => autoAssign(court.id)}>
                      ▶ Start Game
                    </button>
                  )}
                  {queue.length < 4 && (
                    <div style={{fontSize:11,color:'var(--text-dim)',textAlign:'center',marginTop:8}}>Need 4+ in queue</div>
                  )}
                </>
              )}
            </div>
          ))}
        </div>
      )}

      {/* UP NEXT — preview of next 2 matches from queue */}
      {showUpNext && activeTab === 'courts' && queue.length >= 4 && matchMode !== 'Manual' && (() => {
        // Simulate the next 2 auto-assign picks without touching real state.
        // Must mirror autoAssign exactly: same forceMixed counter logic and
        // same priorityIds (readyToFire requested game) check.
        const previewMatches = [];
        // Cap preview queue to first 20 players — avoids O(n⁴) hang with large rosters.
        // The actual autoAssign uses the full queue, so this only affects the preview display.
        let simQueue = queue.slice(0, 20);
        let simAssignCount = assignCount.current;
        let simSbMixedCount = sbMixedCount.current;
        for (let n = 0; n < 2; n++) {
          if (simQueue.length < 4) break;
          simAssignCount += 1;
          let forceMixed = false;
          if (matchMode === 'Skill Based' || matchMode === 'Same Level') {
            forceMixed = simAssignCount % 3 === 0;
          }
          if (matchMode === 'Skill Based') {
            simSbMixedCount += 1;
            forceMixed = simSbMixedCount % 3 === 0;
          }
          // Check for a readyToFire requested game at the front of the simulated queue
          let simPriorityIds = null;
          for (const req of requestedGames) {
            if (!req.readyToFire) continue;
            const positions = req.playerIds.map(id => simQueue.findIndex(p => p.id === id));
            if (positions.some(pos => pos === -1)) continue;
            const maxPos = Math.max(...positions);
            const othersAhead = simQueue.slice(0, maxPos).filter(p => !req.playerIds.includes(p.id)).length;
            if (othersAhead === 0) { simPriorityIds = req.playerIds; break; }
          }
          const m = findMatch(simQueue, matchMode, forceMixed, simPriorityIds);
          if (!m) break;
          previewMatches.push(m);
          simQueue = simQueue.filter(p => !m.ids.includes(p.id));
        }
        if (!previewMatches.length) return null;
        return (
          <div style={{marginTop:12}}>
            <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:1,color:'var(--text-dim)',marginBottom:8,display:'flex',alignItems:'center',gap:6}}>
              <span style={{width:6,height:6,borderRadius:'50%',background:'var(--text-dim)',display:'inline-block'}}></span>
              Up Next — Queue Preview
            </div>
            <div className="courts-grid">
              {previewMatches.map((m, idx) => {
                const fCount = [...m.teamA, ...m.teamB].filter(p => p.gender === 'F').length;
                const matchLabel = matchMode === 'Open Level'
                  ? '⚡ Open Levels'
                  : fCount === 2 ? '♀♂ Mixed Doubles'
                  : fCount === 4 ? "♀ Women's Doubles"
                  : "♂ Men's Doubles";
                return (
                  <div key={idx} className="court-card" style={{
                    borderColor:'var(--text-dim)',
                    borderStyle:'dashed',
                    opacity:0.75,
                    position:'relative',
                    overflow:'hidden',
                  }}>
                    <div style={{position:'absolute',top:0,right:0,background:'var(--surface3)',borderBottomLeftRadius:6,padding:'2px 7px',fontSize:9,fontWeight:800,color:'var(--text-dim)',letterSpacing:1,textTransform:'uppercase'}}>
                      Up Next {idx + 1}
                    </div>
                    <div className="court-header">
                      <span className="court-name" style={{color:'var(--text-muted)'}}>
                        <span className="court-status-dot dot-gray"></span>
                        Next Game {idx + 1}
                      </span>
                      <span style={{fontSize:9,fontWeight:800,color:'var(--text-dim)',letterSpacing:.5,textTransform:'uppercase'}}>{matchLabel}</span>
                    </div>
                    {[
                      { label: '— TEAM A —', players: m.teamA },
                      null,
                      { label: '— TEAM B —', players: m.teamB },
                    ].map((section, si) =>
                      section === null
                        ? <div key="vs" className="team-divider" style={{color:'var(--text-dim)'}}>— VS —</div>
                        : <React.Fragment key={section.label}>
                            <div className="team-divider" style={{color:'var(--text-dim)'}}>{section.label}</div>
                            {section.players.map(p => {
                              const partner = section.players.find(x => x.id !== p.id);
                              const partnerRep = partner ? phGet(p.id, partner.id) : 0;
                              return (
                                <div key={p.id} className="player-slot" style={{opacity:0.85,background:'var(--surface2)'}}>
                                  <GenderTag gender={p.gender} />
                                  <LevelBadge level={p.level} />
                                  <span className="player-name" style={{color:'var(--text-muted)'}}>{p.name}</span>
                                  {partnerRep > 0
                                    ? <span title={`Played together ${partnerRep}× before`} style={{fontSize:9,color:'var(--orange)',fontWeight:800,marginLeft:'auto'}}>🔁×{partnerRep}</span>
                                    : <span style={{fontSize:9,color:'var(--green)',fontWeight:800,marginLeft:'auto'}}>✦ new</span>
                                  }
                                </div>
                              );
                            })}
                          </React.Fragment>
                    )}
                    <div style={{fontSize:10,color:'var(--text-dim)',textAlign:'center',marginTop:8,fontStyle:'italic'}}>
                      preview · subject to change
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* QUEUE TAB */}
      {activeTab === 'queue' && (
        <div className="two-col">
          <div className="card">
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,gap:6,flexWrap:'wrap'}}>
              <div className="section-title" style={{marginBottom:0}}>Waitlist — {queue.length} players</div>
              <div style={{display:'flex',gap:6}}>
                <button
                  className="btn btn-ghost btn-sm"
                  onClick={exportWaitlistXLSX}
                  disabled={queue.length === 0}
                  title="Export waitlist to Excel"
                  style={{display:'flex',alignItems:'center',gap:4,border:'1px solid var(--green)',color:'var(--green)',opacity:queue.length===0?0.4:1}}>
                  ⬇ Excel
                </button>
                <label
                  title="Load players from Excel (.xlsx)"
                  style={{display:'flex',alignItems:'center',gap:4,padding:'5px 10px',borderRadius:'var(--r)',fontSize:11,fontWeight:600,cursor:'pointer',background:'var(--surface3)',border:'1px solid var(--teal)',color:'var(--teal)'}}>
                  ⬆ Load
                  <input type="file" accept=".xlsx,.xls" onChange={importWaitlistXLSX} style={{display:'none'}} />
                </label>
              </div>
            </div>
            {/* Search bar */}
            <div style={{position:'relative',marginBottom:10}}>
              <span style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)',fontSize:13,color:'var(--text-dim)',pointerEvents:'none'}}>🔍</span>
              <input
                type="text"
                placeholder="Search player…"
                value={waitlistSearch}
                onChange={e => setWaitlistSearch(e.target.value)}
                style={{paddingLeft:30,background:'var(--surface3)',border:'1px solid var(--border)',borderRadius:6,fontSize:12,color:'#e8f0fe',width:'100%'}}
              />
              {waitlistSearch && (
                <button
                  onClick={() => setWaitlistSearch('')}
                  style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--text-dim)',cursor:'pointer',fontSize:14,lineHeight:1,padding:0}}
                >✕</button>
              )}
            </div>
            {queue.length === 0
              ? <div className="empty-state">No players in queue. Add some below!</div>
              : (
                <>
                  <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:8,lineHeight:1.5}}>
                    Listed in registration order — earliest arrivals get priority.
                    {matchMode === 'Skill Based' && ' Skill Based: adjacent levels, mixed gender every 3rd game.'}
                    {matchMode === 'Open Level' && ' Open Level: all skill levels, balanced teams.'}
                  </div>
                  <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:8,alignItems:'center'}}>
                    <span style={{fontSize:10,color:'var(--text-dim)',fontWeight:700,textTransform:'uppercase',letterSpacing:.5,marginRight:2}}>Sort:</span>
                    {[
                      { col: null, label: 'Queue Order' },
                      { col: 'name', label: 'Name' },
                      { col: 'level', label: 'Level' },
                      { col: 'games', label: 'Games' },
                    ].map(({col, label}) => (
                      <button key={label}
                        onClick={() => col ? toggleSort(queueSort, setQueueSort, col) : setQueueSort({ col: null, dir: 'asc' })}
                        style={{
                          padding:'3px 10px', borderRadius:20, border:`1px solid ${(!col && !queueSort.col) || queueSort.col===col ? 'var(--blue)' : 'var(--border)'}`,
                          background: (!col && !queueSort.col) || queueSort.col===col ? 'var(--blue-dim)' : 'transparent',
                          color: (!col && !queueSort.col) || queueSort.col===col ? 'var(--blue)' : 'var(--text-muted)',
                          fontSize:11, fontWeight:600, cursor:'pointer',
                        }}>
                        {label}{col && queueSort.col===col && <span style={{marginLeft:3,fontSize:9}}>{queueSort.dir==='asc'?'▲':'▼'}</span>}
                      </button>
                    ))}
                  </div>
                  <div className="queue-list">
                    {(() => {
                      let filtered = queue
                        .filter(p => !waitlistSearch.trim() || p.name.toLowerCase().includes(waitlistSearch.trim().toLowerCase()));
                      if (queueSort.col) {
                        const dir = queueSort.dir === 'asc' ? 1 : -1;
                        filtered = [...filtered].sort((a, b) => {
                          if (queueSort.col === 'name') return dir * a.name.localeCompare(b.name);
                          if (queueSort.col === 'level') return dir * (LEVEL_IDX[a.level] - LEVEL_IDX[b.level]);
                          if (queueSort.col === 'games') return dir * ((playerStats[a.id]?.games||0) - (playerStats[b.id]?.games||0));
                          return 0;
                        });
                      }
                      if (filtered.length === 0) return (
                        <div className="empty-state" style={{padding:'16px',fontSize:12}}>No players match "{waitlistSearch}"</div>
                      );
                      return filtered.map((p, i) => {
                        const partner = p.partnerId ? queue.find(x => x.id === p.partnerId) : null;
                        const gamesPlayed = playerStats[p.id]?.games || 0;
                        const queuePos = queue.findIndex(x => x.id === p.id) + 1;
                        return (
                          <div key={p.id} className="queue-item" style={{flexWrap: editingPlayerId === p.id ? 'wrap' : 'nowrap'}}>
                            <span className="queue-num">#{queuePos}</span>
                            <GenderTag gender={p.gender} />
                            {editingPlayerId === p.id ? (
                              <>
                                <input
                                  autoFocus
                                  value={editingPlayerName}
                                  onChange={e => setEditingPlayerName(e.target.value)}
                                  onKeyDown={e => {
                                    if (e.key === 'Enter') renamePlayer(p.id, editingPlayerName);
                                    if (e.key === 'Escape') { setEditingPlayerId(null); setEditingPlayerName(''); setEditingPlayerLevel('Beginner'); }
                                  }}
                                  style={{flex:1,padding:'3px 7px',fontSize:12,borderRadius:5,border:'1px solid var(--blue)',background:'var(--surface)',color:'#e8f0fe',outline:'none',minWidth:0}}
                                />
                                <select
                                  value={editingPlayerLevel}
                                  onChange={e => setEditingPlayerLevel(e.target.value)}
                                  style={{padding:'3px 6px',fontSize:11,borderRadius:5,border:'1px solid var(--blue)',background:'var(--surface)',color:'#e8f0fe',outline:'none',width:'auto'}}
                                >
                                  {LEVELS.map(l => <option key={l} value={l}>{l}</option>)}
                                </select>
                              </>
                            ) : (
                              <>
                                <LevelBadge level={p.level} />
                                <span className="queue-name">{p.name}</span>
                              </>
                            )}
                            {partner && (
                              <span className="partner-tag" title="Fixed pair" style={{cursor:'pointer'}} onClick={() => unlinkPartner(p.id)}>🔗 {partner.name} ✕</span>
                            )}
                            <span style={{fontSize:10,color:'var(--text-muted)',marginLeft:'auto',marginRight:4,whiteSpace:'nowrap'}}>
                              🎮 {gamesPlayed}g
                            </span>
                            {editingPlayerId === p.id ? (
                              <>
                                <button className="btn btn-green btn-sm" onClick={() => renamePlayer(p.id, editingPlayerName)}>✓</button>
                                <button className="btn btn-ghost btn-sm" onClick={() => { setEditingPlayerId(null); setEditingPlayerName(''); setEditingPlayerLevel('Beginner'); }}>✕</button>
                              </>
                            ) : (
                              <>
                                {!partner && (
                                  <button
                                    className="btn btn-ghost btn-sm"
                                    title="Link fixed partner"
                                    style={{color:'#ce93d8',borderColor:'#9c27b055'}}
                                    onClick={() => { setPairModal({ playerId: p.id }); setPairTarget(null); }}
                                  >🔗</button>
                                )}
                                <button className="btn btn-ghost btn-sm" title="Edit player" onClick={() => { setEditingPlayerId(p.id); setEditingPlayerName(p.name); setEditingPlayerLevel(p.level); }}>✏️</button>
                                <button className="btn btn-ghost btn-sm" onClick={() => removeFromQueue(p.id)}>✕</button>
                              </>
                            )}
                          </div>
                        );
                      });
                    })()}
                  </div>
                </>
              )
            }
          </div>
          <div>
            <div className="card" style={{marginBottom:12}}>
              <div className="section-title">Add Player</div>

                      </button>

                <div><strong style={{color:'var(--orange)'}}>High-Int</strong> — Solid fundamentals, strategic play</div>

      {/* PLAYER LIST TAB — master roster */}

                    const allSessionPlayers = [
                      ...queue,
                      ...courts.flatMap(c => c.players ? [...c.players.teamA, ...c.players.teamB] : [])
                    ];
                    const players = req.playerIds.map(id => {
                      const p = allSessionPlayers.find(x => x.id === id);
                      const onCourt = p && courts.some(c => c.players && [...c.players.teamA,...c.players.teamB].find(x=>x.id===id));
                      const baseline = req.baselineCounts?.[id] ?? 0;
                      const currentGames = playerStats[id]?.games || 0;
                      const roundedUp = currentGames > baseline;
                      return p ? { ...p, onCourt, roundedUp } : null;
                    });
                    const allFound = players.every(Boolean);
                    const allFree = allFound && players.every(p => !p.onCourt);
                    const allRoundedUp = allFound && players.every(p => p.roundedUp);
                    const someOnCourt = players.some(p => p && p.onCourt);
                    const hasOpenCourt = courts.some(c => !c.players);
                    const canStart = allFree && hasOpenCourt;
                    const isReadyToFire = !!req.readyToFire;
                    // Count others in queue ahead of these 4
                    const positions = req.playerIds.map(id => queue.findIndex(p => p.id === id));
                    const allInQueue = positions.every(pos => pos !== -1);
                    const maxPos = allInQueue ? Math.max(...positions) : -1;
                    const othersAhead = allInQueue ? queue.slice(0, maxPos).filter(p => !req.playerIds.includes(p.id)).length : null;
                    const atFront = allInQueue && othersAhead === 0;
                    return (
                      <div key={req.id} className="req-item" style={{flexWrap:'wrap',gap:8,

                          {allFound && !isReadyToFire && someOnCourt && <span style={{fontSize:10,color:'var(--blue)',fontWeight:700}}>🏓 Waiting for round to finish</span>}
                          {allFound && !isReadyToFire && !someOnCourt && <span style={{fontSize:10,color:'var(--text-muted)',fontWeight:700}}>⏳ Waiting for all other players to play a round</span>}

                                {p.roundedUp && !p.onCourt && <span style={{fontSize:9,color:'var(--green)',fontWeight:800,marginLeft:2}}>✓</span>}
                              </span>
                            : <span key={req.playerIds[i]} style={{fontSize:11,color:'var(--red)',background:'var(--red-dim)',borderRadius:6,padding:'3px 8px'}}>Left session</span>
                          )}
                        </div>
                        <button
                          className="btn btn-sm"
                          style={{width:'100%',background:canStart?'var(--orange)':'var(--surface3)',color:canStart?'#000':'var(--text-dim)',border:`1px solid ${canStart?'var(--orange)':'var(--border)'}`,opacity:canStart?1:0.5,cursor:canStart?'pointer':'not-allowed'}}
                          disabled={!canStart}
                          onClick={() => startRequestedGame(req)}

                      </div>
                    );
                  })}
                </div>
              )
            }

              const allSessionPlayers = [

                ...courts.flatMap(c => c.players ? [...c.players.teamA, ...c.players.teamB] : [])
              ];
              // Deduplicate by id (shouldn't duplicate but safety)
              const seen = new Set();
              const playerPool = allSessionPlayers.filter(p => { if (seen.has(p.id)) return false; seen.add(p.id); return true; });

              return (
                <>
                  <div style={{fontSize:11,color:reqSelected.length===4?'var(--green)':'var(--text-muted)',fontWeight:700,marginBottom:6}}>

                    <input
                      type="text"
                      placeholder="Search player…"

                    />
                    {reqSearch && (
                      <button onClick={() => setReqSearch('')} style={{position:'absolute',right:6,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--text-dim)',cursor:'pointer',fontSize:13,lineHeight:1,padding:0}}>✕</button>
                    )}
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:5,maxHeight:260,overflowY:'auto',marginBottom:10}}>

                            return (
                              <div

                                  color: sel ? 'var(--orange)' : '#e8f0fe'

                                <span style={{fontSize:12,fontWeight:600,flex:1}}>{p.name}</span>

                                {sel && <span style={{fontSize:11,color:'var(--orange)',fontWeight:800}}>✓</span>}
                              </div>
                            );
                          });

                    <button className="btn btn-ghost btn-sm" onClick={() => setReqSelected([])}>Clear</button>
                  </div>
                </>

            })()}

                ⚠ Need at least 4 players in the waitlist to simulate.

              <button className="btn btn-ghost btn-sm" onClick={() => setSimModal(false)}>Cancel</button>
            </div>
          </div>
        </div>

          <div className="pair-modal" onClick={e => e.stopPropagation()}>

            <p>
              Select a partner for <strong style={{color:'#ce93d8'}}>{queue.find(p=>p.id===pairModal.playerId)?.name}</strong>.
              They will always be placed on the same team.
            </p>
            {/* Search box */}
            <div style={{position:'relative',marginBottom:10}}>
              <span style={{position:'absolute',left:8,top:'50%',transform:'translateY(-50%)',fontSize:13,color:'var(--text-dim)',pointerEvents:'none'}}>🔍</span>
              <input
                type="text"
                placeholder="Search player…"
                value={pairSearch}
                onChange={e => setPairSearch(e.target.value)}
                style={{paddingLeft:30,fontSize:12,background:'var(--surface3)',border:'1px solid var(--border)',borderRadius:6,color:'#e8f0fe',width:'100%'}}

              {pairSearch && (
                <button onClick={() => setPairSearch('')} style={{position:'absolute',right:6,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--text-dim)',cursor:'pointer',fontSize:13,lineHeight:1,padding:0}}>✕</button>

            </div>
            <div className="pair-select-list">
              {(() => {

            <div style={{display:'flex',gap:8}}>
              <button
                className="btn btn-sm"
                style={{flex:1,background:'var(--purple)',color:'#fff',opacity:pairTarget?1:0.4}}

              <button className="btn btn-ghost btn-sm" onClick={() => { setPairModal(null); setPairTarget(null); setPairSearch(''); }}>Cancel</button>
            </div>
          </div>
        </div>

      {activeTab === 'history' && (
        <div className="card">
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <div className="section-title" style={{marginBottom:0}}>Game History</div>

              <button className="btn btn-ghost btn-sm" onClick={exportHistoryCSV}
                style={{display:'flex',alignItems:'center',gap:5,border:'1px solid var(--green)',color:'var(--green)'}}>

            )}
          </div>
          {history.length === 0
            ? <div className="empty-state">No games completed yet. End a game to record the score!</div>
            : (
              <div style={{overflowX:'auto'}}>
                <table className="history-table">
                  <thead>
                    <tr>
                      {[
                        { col: 'id', label: '#' },
                        { col: 'time', label: 'Time' },
                        { col: 'courtId', label: 'Court' },
                        { col: null, label: 'Team A' },
                        { col: 'scoreA', label: 'Score' },
                        { col: null, label: 'Team B' },
                        { col: 'winner', label: 'Winner' },
                        { col: 'duration', label: 'Duration' },
                      ].map(({col, label}) => (
                        <th key={label} onClick={col ? () => toggleSort(historySort, setHistorySort, col) : undefined}
                          style={{cursor: col ? 'pointer' : 'default', userSelect:'none', whiteSpace:'nowrap'}}>
                          {label}{col && <SortIcon sort={historySort} col={col} />}
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {(() => {
                      let sorted = [...history];
                      if (historySort.col) {
                        sorted.sort((a, b) => {
                          let av = a[historySort.col], bv = b[historySort.col];
                          if (historySort.col === 'duration') { av = Number(av); bv = Number(bv); }
                          if (historySort.col === 'scoreA') { av = Number(av); bv = Number(bv); }
                          if (historySort.col === 'id') { av = Number(av); bv = Number(bv); }
                          if (historySort.col === 'courtId') { av = Number(av); bv = Number(bv); }
                          if (av < bv) return historySort.dir === 'asc' ? -1 : 1;
                          if (av > bv) return historySort.dir === 'asc' ? 1 : -1;
                          return 0;
                        });
                      } else {
                        sorted.reverse();
                      }
                      return sorted.map((g, i) => (
                      <tr key={g.id}>
                        <td style={{color:'var(--text-dim)'}}>{history.length - i}</td>
                        <td style={{color:'var(--text-muted)',fontSize:11}}>{g.time}</td>
                        <td><strong>Court {g.courtId}</strong></td>
                        <td>
                          {g.teamA.map(p => (
                            <div key={p.id} style={{display:'flex',gap:4,alignItems:'center',marginBottom:2}}>
                              <GenderTag gender={p.gender}/><LevelBadge level={p.level}/><span style={{fontSize:12}}>{p.name}</span>
                            </div>
                          ))}
                        </td>
                        <td style={{textAlign:'center'}}>
                          <span className={`score-display ${g.winner==='A'?'win':g.winner==='B'?'lose':''}`}>{g.scoreA}</span>
                          <span style={{color:'var(--text-dim)',margin:'0 6px'}}>–</span>
                          <span className={`score-display ${g.winner==='B'?'win':g.winner==='A'?'lose':''}`}>{g.scoreB}</span>
                        </td>
                        <td>
                          {g.teamB.map(p => (
                            <div key={p.id} style={{display:'flex',gap:4,alignItems:'center',marginBottom:2}}>
                              <GenderTag gender={p.gender}/><LevelBadge level={p.level}/><span style={{fontSize:12}}>{p.name}</span>
                            </div>
                          ))}
                        </td>
                        <td>
                          {g.winner === 'tie'
                            ? <span style={{color:'var(--gold)',fontWeight:700,fontSize:12}}>TIE</span>
                            : <span style={{color:'var(--green)',fontWeight:700,fontSize:12}}>Team {g.winner}</span>
                          }
                        </td>
                        <td style={{color:'var(--text-muted)',fontSize:11}}>{g.duration}m</td>
                      </tr>
                    ));
                    })()}
                  </tbody>
                </table>
              </div>
            )
          }
        </div>
      )}

      {/* STATS TAB */}
      {activeTab === 'stats' && (
        <div className="card">
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <div className="section-title" style={{marginBottom:0}}>Player Statistics — {Object.keys(playerStats).length} players</div>
            {Object.keys(playerStats).length > 0 && (
              <button className="btn btn-ghost btn-sm" onClick={exportStatsCSV}
                style={{display:'flex',alignItems:'center',gap:5,border:'1px solid var(--green)',color:'var(--green)'}}>
                ⬇ Export CSV
              </button>
            )}
          </div>
          {Object.keys(playerStats).length === 0
            ? <div className="empty-state">Complete games to see player stats here!</div>
            : (
              <div style={{overflowX:'auto'}}>
                <table className="history-table" style={{tableLayout:'fixed',minWidth:580}}>
                  <colgroup>
                    <col style={{width:40}} />
                    <col style={{width:160}} />
                    <col style={{width:80}} />
                    <col style={{width:60}} />
                    <col style={{width:60}} />
                    <col style={{width:70}} />
                    <col style={{width:70}} />
                    <col style={{width:70}} />
                    <col style={{width:80}} />
                  </colgroup>
                  <thead>
                    <tr>
                      {[
                        { col: null, label: '#', align: 'center' },
                        { col: 'name', label: 'Player', align: 'left' },
                        { col: 'level', label: 'Level', align: 'center' },
                        { col: 'games', label: 'Games', align: 'center' },
                        { col: 'wins', label: 'Wins', align: 'center' },
                        { col: 'losses', label: 'Losses', align: 'center' },
                        { col: 'winPct', label: 'Win %', align: 'center' },
                        { col: 'pts', label: 'Pts For', align: 'center' },
                        { col: 'against', label: 'Pts Ag.', align: 'center' },
                        { col: 'diff', label: 'Diff', align: 'center' },
                      ].map(({col, label, align}) => (
                        <th key={label} onClick={col ? () => toggleSort(statsSort, setStatsSort, col) : undefined}
                          style={{textAlign:align, cursor: col ? 'pointer' : 'default', userSelect:'none', whiteSpace:'nowrap'}}>
                          {label}{col && <SortIcon sort={statsSort} col={col} />}
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {Object.entries(playerStats)
                      .map(([id, s]) => {
                        const losses = s.games - s.wins;
                        const winPct = s.games ? Math.round(s.wins / s.games * 100) : 0;
                        const diff = s.pts - s.against;
                        return { id, s, losses, winPct, diff };
                      })
                      .sort((a, b) => {
                        const col = statsSort.col || 'wins';
                        const dir = statsSort.dir === 'asc' ? 1 : -1;
                        if (col === 'name') return dir * a.s.name.localeCompare(b.s.name);
                        if (col === 'level') return dir * (LEVEL_IDX[a.s.level] - LEVEL_IDX[b.s.level]);
                        if (col === 'games') return dir * (a.s.games - b.s.games);
                        if (col === 'wins') return dir * (a.s.wins - b.s.wins) || (b.s.games - a.s.games);
                        if (col === 'losses') return dir * (a.losses - b.losses);
                        if (col === 'winPct') return dir * (a.winPct - b.winPct);
                        if (col === 'pts') return dir * (a.s.pts - b.s.pts);
                        if (col === 'against') return dir * (a.s.against - b.s.against);
                        if (col === 'diff') return dir * (a.diff - b.diff);
                        return 0;
                      })
                      .map(({ id, s, losses, winPct, diff }, i) => {
                        return (
                          <tr key={id}>
                            <td style={{textAlign:'center',color:'var(--text-dim)',fontWeight:700}}>{i+1}</td>
                            <td>
                              <div style={{display:'flex',alignItems:'center',gap:5}}>
                                <GenderTag gender={s.gender}/>
                                <span style={{fontWeight:700,fontSize:13}}>{s.name}</span>
                              </div>
                            </td>
                            <td style={{textAlign:'center'}}><LevelBadge level={s.level} /></td>
                            <td style={{textAlign:'center',fontWeight:600}}>{s.games}</td>
                            <td style={{textAlign:'center',fontWeight:700,color:'var(--green)'}}>{s.wins}</td>
                            <td style={{textAlign:'center',fontWeight:600,color:'#f88'}}>{losses}</td>
                            <td style={{textAlign:'center'}}>
                              <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                                <span style={{fontWeight:700,fontSize:13}}>{winPct}%</span>
                                <div style={{width:40,height:3,background:'var(--surface3)',borderRadius:4,overflow:'hidden'}}>
                                  <div style={{width:`${winPct}%`,height:'100%',background:'var(--green)',borderRadius:4}}></div>
                                </div>
                              </div>
                            </td>
                            <td style={{textAlign:'center',fontWeight:600}}>{s.pts}</td>
                            <td style={{textAlign:'center',fontWeight:600}}>{s.against}</td>
                            <td style={{textAlign:'center',fontWeight:700,color: diff >= 0 ? 'var(--green)' : '#f88'}}>
                              {diff >= 0 ? '+':''}{diff}
                            </td>
                          </tr>
                        );
                      })
                    }
                  </tbody>
                </table>
              </div>
            )
          }
        </div>
      )}

      {/* SESSION MODALS */}
      {sessionModal === 'new' && (
        <div className="session-modal-overlay" onClick={e => e.target === e.currentTarget && setSessionModal(null)}>
          <div className="session-modal">
            <h2>＋ New Session</h2>
            <p>Starting a new session will clear all players, courts, and history from the current session. Make sure to <strong style={{color:'var(--teal)'}}>Save</strong> first if you want to keep this session!</p>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:11,color:'var(--text-muted)',fontWeight:700,textTransform:'uppercase',letterSpacing:.5,display:'block',marginBottom:6}}>Session Name</label>
              <input
                placeholder={`Session ${savedSessions.length + 2}`}
                value={newSessionName}
                onChange={e => setNewSessionName(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && startNewSession(newSessionName)}
                autoFocus
              />
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-gold" style={{flex:1}} onClick={() => startNewSession(newSessionName)}>Start New Session</button>
              <button className="btn btn-ghost" onClick={() => setSessionModal(null)}>Cancel</button>
            </div>
            {history.length > 0 && (
              <div style={{marginTop:12,display:'flex',gap:8}}>
                <button className="btn btn-teal btn-sm" style={{flex:1}} onClick={() => { saveSession(); setTimeout(() => { setSessionModal('new'); }, 100); }}>
                  💾 Save Current First
                </button>
              </div>
            )}
          </div>
        </div>
      )}

      {sessionModal === 'load' && (
        <div className="session-modal-overlay" onClick={e => e.target === e.currentTarget && setSessionModal(null)}>
          <div className="session-modal">
            <h2>📂 Load Session</h2>
            <p>Select a previously saved session to restore. Your current session will be replaced.</p>
            {savedSessions.length === 0
              ? <div className="empty-state" style={{padding:'20px 0'}}>No saved sessions yet. Hit 💾 Save to save the current session.</div>
              : (
                <div className="saved-sessions-list">
                  {[...savedSessions].reverse().map(s => (
                    <div key={s.name} className="saved-session-item" onClick={() => loadSession(s)}>
                      <span style={{fontSize:16}}>📋</span>
                      <div style={{flex:1}}>
                        <div className="ssi-name">{s.name}</div>
                        <div className="ssi-meta">
                          {s.history?.length || 0} games · {s.queue?.length || 0} in queue · Saved {new Date(s.savedAt).toLocaleString([],{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}
                        </div>
                      </div>
                      <button
                        className="btn btn-red btn-sm"
                        onClick={e => deleteSession(s.name, e)}
                        title="Delete this session"
                        style={{flexShrink:0}}
                      >✕</button>
                    </div>
                  ))}
                </div>
              )
            }
            <div style={{display:'flex',gap:8,marginTop:4}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={() => setSessionModal(null)}>Close</button>
            </div>
          </div>
        </div>
      )}

      {/* SCORE MODAL */}
      {scoreModal && (() => {
        // swapPending: id of the player selected to swap out
        const swapWith = (idA, idB) => {
          // idA is from teamA, idB from teamB — swap them
          setModalTeamA(prev => prev.map(p => p.id === idA ? modalTeamB.find(p2 => p2.id === idB) : p));
          setModalTeamB(prev => prev.map(p => p.id === idB ? modalTeamA.find(p2 => p2.id === idA) : p));
        };
        return (
          <div className="score-modal-overlay" onClick={e => e.target === e.currentTarget && setScoreModal(null)}>
            <div className="score-modal-inner" style={{width:400,maxWidth:'95vw'}}>
              <h2>🏆 Game Over — Court {scoreModal.courtId}</h2>
              {(() => {
                const all = [...modalTeamA, ...modalTeamB];
                const fCount = all.filter(p => p.gender === 'F').length;
                const matchType = fCount === 2 ? '♀♂ Mixed Doubles' : fCount === 4 ? '♀ Women\'s Doubles' : '♂ Men\'s Doubles';
                const matchColor = fCount === 2 ? '#f06292' : fCount === 4 ? '#f06292' : '#64b5f6';
                return <div style={{fontSize:11,fontWeight:800,color:matchColor,textTransform:'uppercase',letterSpacing:1,marginTop:2,marginBottom:4}}>{matchType}</div>;
              })()}
              <p style={{color:'var(--text-muted)',fontSize:13,marginTop:4}}>Swap players between teams if needed, then enter the score</p>

              {/* Player swap grid */}
              <div style={{margin:'16px 0 10px',background:'var(--surface2)',borderRadius:8,padding:'12px',border:'1px solid var(--border)'}}>
                <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:1,color:'var(--text-muted)',marginBottom:10}}>
                  Tap ⇄ to swap a player across teams
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr auto 1fr',gap:6,alignItems:'center'}}>
                  {/* Team A header */}
                  <div style={{fontSize:10,fontWeight:700,color:'var(--blue)',textTransform:'uppercase',letterSpacing:1,textAlign:'center'}}>Team A</div>
                  <div></div>
                  <div style={{fontSize:10,fontWeight:700,color:'var(--orange)',textTransform:'uppercase',letterSpacing:1,textAlign:'center'}}>Team B</div>

                  {/* Row per pair: A[0] vs B[0], A[1] vs B[1] */}
                  {[0, 1].map(i => {
                    const pA = modalTeamA[i];
                    const pB = modalTeamB[i];
                    if (!pA || !pB) return null;
                    return (
                      <React.Fragment key={i}>
                        {/* Team A player */}
                        <div style={{background:'var(--surface3)',borderRadius:6,padding:'7px 8px',border:'1px solid var(--blue)44',display:'flex',alignItems:'center',gap:5}}>
                          <GenderTag gender={pA.gender} />
                          <LevelBadge level={pA.level} />
                          <span style={{fontSize:12,fontWeight:600}}>{pA.name}</span>
                        </div>

                        {/* Swap button between this pair */}
                        <div style={{display:'flex',flexDirection:'column',gap:4,alignItems:'center'}}>
                          <button
                            title={`Swap ${pA.name} ↔ ${pB.name}`}
                            onClick={() => swapWith(pA.id, pB.id)}
                            style={{background:'var(--surface3)',border:'1px solid var(--border)',borderRadius:6,cursor:'pointer',color:'var(--gold)',fontSize:16,padding:'6px 8px',lineHeight:1,fontWeight:700,transition:'all 0.15s'}}
                            onMouseOver={e=>{e.currentTarget.style.background='var(--gold-dim)';e.currentTarget.style.borderColor='var(--gold)';}}
                            onMouseOut={e=>{e.currentTarget.style.background='var(--surface3)';e.currentTarget.style.borderColor='var(--border)';}}
                          >⇄</button>
                        </div>

                        {/* Team B player */}
                        <div style={{background:'var(--surface3)',borderRadius:6,padding:'7px 8px',border:'1px solid var(--orange)44',display:'flex',alignItems:'center',gap:5}}>
                          <GenderTag gender={pB.gender} />
                          <LevelBadge level={pB.level} />
                          <span style={{fontSize:12,fontWeight:600}}>{pB.name}</span>
                        </div>
                      </React.Fragment>
                    );
                  })}

                  {/* Cross-swap row: A[0] vs B[1] and A[1] vs B[0] */}
                  {modalTeamA[0] && modalTeamA[1] && modalTeamB[0] && modalTeamB[1] && (
                    <>
                      <div style={{gridColumn:'1/-1',borderTop:'1px solid var(--border)',margin:'4px 0'}}></div>
                      <div style={{fontSize:10,color:'var(--text-dim)',textAlign:'center',gridColumn:'1/-1',marginBottom:2}}>cross-swap</div>
                      <div style={{background:'var(--surface3)',borderRadius:6,padding:'7px 8px',border:'1px solid var(--blue)44',display:'flex',alignItems:'center',gap:5}}>
                        <GenderTag gender={modalTeamA[0].gender} />
                        <LevelBadge level={modalTeamA[0].level} />
                        <span style={{fontSize:12,fontWeight:600}}>{modalTeamA[0].name}</span>
                      </div>
                      <button
                        title={`Swap ${modalTeamA[0].name} ↔ ${modalTeamB[1].name}`}
                        onClick={() => swapWith(modalTeamA[0].id, modalTeamB[1].id)}
                        style={{background:'var(--surface3)',border:'1px solid var(--border)',borderRadius:6,cursor:'pointer',color:'var(--gold)',fontSize:16,padding:'6px 8px',lineHeight:1,fontWeight:700,transition:'all 0.15s'}}
                        onMouseOver={e=>{e.currentTarget.style.background='var(--gold-dim)';e.currentTarget.style.borderColor='var(--gold)';}}
                        onMouseOut={e=>{e.currentTarget.style.background='var(--surface3)';e.currentTarget.style.borderColor='var(--border)';}}
                      >⇄</button>
                      <div style={{background:'var(--surface3)',borderRadius:6,padding:'7px 8px',border:'1px solid var(--orange)44',display:'flex',alignItems:'center',gap:5}}>
                        <GenderTag gender={modalTeamB[1].gender} />
                        <LevelBadge level={modalTeamB[1].level} />
                        <span style={{fontSize:12,fontWeight:600}}>{modalTeamB[1].name}</span>
                      </div>

                      <div style={{background:'var(--surface3)',borderRadius:6,padding:'7px 8px',border:'1px solid var(--blue)44',display:'flex',alignItems:'center',gap:5}}>
                        <GenderTag gender={modalTeamA[1].gender} />
                        <LevelBadge level={modalTeamA[1].level} />
                        <span style={{fontSize:12,fontWeight:600}}>{modalTeamA[1].name}</span>
                      </div>
                      <button
                        title={`Swap ${modalTeamA[1].name} ↔ ${modalTeamB[0].name}`}
                        onClick={() => swapWith(modalTeamA[1].id, modalTeamB[0].id)}
                        style={{background:'var(--surface3)',border:'1px solid var(--border)',borderRadius:6,cursor:'pointer',color:'var(--gold)',fontSize:16,padding:'6px 8px',lineHeight:1,fontWeight:700,transition:'all 0.15s'}}
                        onMouseOver={e=>{e.currentTarget.style.background='var(--gold-dim)';e.currentTarget.style.borderColor='var(--gold)';}}
                        onMouseOut={e=>{e.currentTarget.style.background='var(--surface3)';e.currentTarget.style.borderColor='var(--border)';}}
                      >⇄</button>
                      <div style={{background:'var(--surface3)',borderRadius:6,padding:'7px 8px',border:'1px solid var(--orange)44',display:'flex',alignItems:'center',gap:5}}>
                        <GenderTag gender={modalTeamB[0].gender} />
                        <LevelBadge level={modalTeamB[0].level} />
                        <span style={{fontSize:12,fontWeight:600}}>{modalTeamB[0].name}</span>
                      </div>
                    </>
                  )}
                </div>
              </div>

              {/* Score inputs */}
              {scoringEnabled && (
              <div className="score-inputs">
                <div className="score-team">
                  <label>Team A<br/><span style={{color:'#e8f0fe'}}>{modalTeamA.map(p=>p.name).join(' & ')}</span></label>
                  <input type="number" min="0" max="99" value={scoreA} onChange={e=>setScoreA(e.target.value)} placeholder="0" autoFocus />
                </div>
                <div className="score-team">
                  <label>Team B<br/><span style={{color:'#e8f0fe'}}>{modalTeamB.map(p=>p.name).join(' & ')}</span></label>
                  <input type="number" min="0" max="99" value={scoreB} onChange={e=>setScoreB(e.target.value)} placeholder="0" />
                </div>
              </div>
              )}
              <div className="modal-btns">
                <button className="btn btn-green" style={{flex:1}} onClick={submitScore}>Save Score & Return Players</button>
                <button className="btn btn-ghost" onClick={() => setScoreModal(null)}>Cancel</button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
