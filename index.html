<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DINK Republic Open Play</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a1628; color: #e8f0fe; min-height: 100vh; }
  :root {
    --green: #00c853; --green-dim: #1a3a2a; --green-mid: #00963e;
    --gold: #ffd600; --gold-dim: #2a2200;
    --blue: #2196f3; --blue-dim: #0d2040;
    --red: #f44336; --red-dim: #2a0d0d;
    --orange: #ff9800; --orange-dim: #2a1800;
    --purple: #9c27b0; --purple-dim: #1a0a2a;
    --teal: #00bcd4; --teal-dim: #0a2228;
    --surface: #112240; --surface2: #172a4a; --surface3: #1e3560;
    --border: #2a4070; --text-muted: #7a9cc4; --text-dim: #4a6a94;
    --r: 8px;
  }
  .app { max-width: 1200px; margin: 0 auto; padding: 16px; }
  .header { text-align: center; margin-bottom: 20px; padding: 20px 0 10px; }
  .header h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.5px; color: var(--green); text-transform: uppercase; }
  .header p { color: var(--text-muted); font-size: 13px; margin-top: 4px; }
  .btn { border: none; border-radius: var(--r); padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .btn:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-green { background: var(--green); color: #000; }
  .btn-red { background: var(--red); color: #fff; }
  .btn-blue { background: var(--blue); color: #fff; }
  .btn-gold { background: var(--gold); color: #000; }
  .btn-ghost { background: var(--surface3); color: var(--text-muted); border: 1px solid var(--border); }
  .btn-sm { padding: 5px 10px; font-size: 11px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; }
  .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 10px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .badge-open { background: #1a2a1a; color: #aaffaa; border: 1px solid #00c85355; }
  .badge-beg { background: var(--green-dim); color: var(--green); }
  .badge-li { background: var(--blue-dim); color: var(--blue); }
  .badge-int { background: var(--teal-dim); color: var(--teal); }
  .badge-hi { background: var(--orange-dim); color: var(--orange); }
  .badge-adv { background: var(--purple-dim); color: #ce93d8; }
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 12px; text-align: center; }
  .stat-card .val { font-size: 32px; font-weight: 800; line-height: 1; }
  .stat-card .lbl { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .courts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .court-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); padding: 12px; }
  .court-card.active { border-color: var(--green); }
  .court-card.open { border-color: var(--text-dim); border-style: dashed; }
  .court-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .court-name { font-weight: 700; font-size: 14px; }
  .court-timer { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .timer-warn { color: var(--orange); }
  .timer-ok { color: var(--green); }
  .timer-over { color: var(--red); animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .player-slot { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; margin-bottom: 4px; background: var(--surface3); }
  .player-slot.empty { border: 1px dashed var(--border); background: transparent; color: var(--text-dim); font-size: 12px; justify-content: center; }
  .player-name { font-size: 13px; font-weight: 600; flex: 1; }
  .team-divider { text-align: center; font-size: 10px; color: var(--text-dim); margin: 4px 0; font-weight: 700; letter-spacing: 1px; }
  .queue-list { display: flex; flex-direction: column; gap: 6px; max-height: 300px; overflow-y: auto; }
  .queue-item { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; }
  .queue-num { font-size: 11px; color: var(--text-dim); font-weight: 700; min-width: 20px; }
  .queue-name { flex: 1; font-size: 13px; font-weight: 600; }
  .add-player-form { display: flex; flex-direction: column; gap: 8px; }
  input, select { background: var(--surface3); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-size: 13px; color: #e8f0fe; outline: none; width: 100%; }
  input:focus, select:focus { border-color: var(--blue); }
  select option { background: #172a4a; }
  .controls-bar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 12px; margin-bottom: 16px; }
  .ctrl-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .ctrl-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  .mode-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .mode-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
  .time-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .time-btn.active { background: var(--gold); border-color: var(--gold); color: #000; }
  .history-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .history-table th { text-align: left; padding: 8px 8px; color: var(--text-muted); font-weight: 600; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; }
  .history-table td { padding: 8px 8px; border-bottom: 1px solid var(--surface3); vertical-align: middle; }
  .history-table tr:hover td { background: var(--surface2); }
  .score-display { font-weight: 700; font-size: 15px; }
  .win { color: var(--green); }
  .lose { color: #f88; }
  .player-stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 8px; }
  .player-stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); padding: 12px; }
  .ps-name { font-weight: 700; font-size: 13px; }
  .ps-row { display: flex; justify-content: space-between; font-size: 12px; margin-top: 5px; color: var(--text-muted); }
  .ps-val { color: #e8f0fe; font-weight: 600; }
  .score-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .score-modal-inner { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px; width: 360px; }
  .score-modal-inner h2 { font-size: 20px; margin-bottom: 6px; }
  .score-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 20px 0; }
  .score-team { text-align: center; }
  .score-team label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; }
  .score-team input { text-align: center; font-size: 32px; font-weight: 800; padding: 12px; }
  .modal-btns { display: flex; gap: 8px; }
  .tabbar { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 14px; overflow-x: auto; }
  .tab { padding: 10px 16px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap; }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }
  .empty-state { text-align: center; padding: 32px; color: var(--text-dim); font-size: 13px; }
  .divider-v { width: 1px; height: 24px; background: var(--border); }
  .court-status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; vertical-align: middle; flex-shrink: 0; }
  .dot-green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot-gray { background: var(--text-dim); }
  .player-select-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; max-height: 160px; overflow-y: auto; margin-bottom: 8px; }
  .player-select-item { padding: 7px 10px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; font-size: 12px; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
  .player-select-item:hover { border-color: var(--blue); }
  .player-select-item.selected { border-color: var(--green); background: var(--green-dim); color: var(--green); }
  .notification { position: fixed; top: 20px; right: 20px; background: var(--surface); border: 1px solid var(--green); border-radius: var(--r); padding: 14px 18px; font-size: 13px; font-weight: 600; color: var(--green); z-index: 200; animation: slideIn 0.3s ease; max-width: 300px; box-shadow: 0 4px 20px rgba(0,200,83,0.2); }
  @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(24px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .two-col { display: grid; grid-template-columns: 1fr 300px; gap: 12px; }
  @media (max-width: 700px) {
    .stat-grid { grid-template-columns: repeat(2,1fr); }
    .two-col { grid-template-columns: 1fr; }
    .controls-bar { flex-direction: column; align-items: flex-start; }
  }
  .win-rate-bar { height: 4px; background: var(--surface3); border-radius: 4px; margin-top: 6px; overflow: hidden; }
  .win-rate-fill { height: 100%; background: var(--green); border-radius: 4px; transition: width 0.4s; }
  .level-legend { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .court-action-row { display: flex; gap: 6px; margin-top: 8px; }
  .partner-tag { display: inline-flex; align-items: center; gap: 3px; background: var(--purple-dim); color: #ce93d8; border: 1px solid #9c27b055; border-radius: 20px; padding: 1px 7px; font-size: 10px; font-weight: 700; }
  .partner-pair-row { display: flex; gap: 6px; align-items: center; background: var(--purple-dim); border: 1px solid #9c27b044; border-radius: 6px; padding: 5px 8px; margin-bottom: 4px; }
  .pair-divider { font-size: 9px; color: #ce93d8; font-weight: 800; letter-spacing: 1px; }
  .session-bar { display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); padding: 8px 14px; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .session-info { display: flex; align-items: center; gap: 10px; }
  .session-name { font-size: 13px; font-weight: 700; color: #e8f0fe; }
  .session-meta { font-size: 11px; color: var(--text-muted); }
  .session-actions { display: flex; gap: 6px; }
  .session-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 300; }
  .session-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px; width: 380px; max-width: 95vw; }
  .session-modal h2 { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
  .session-modal p { font-size: 13px; color: var(--text-muted); margin-bottom: 18px; line-height: 1.5; }
  .saved-sessions-list { display: flex; flex-direction: column; gap: 6px; max-height: 220px; overflow-y: auto; margin-bottom: 14px; }
  .saved-session-item { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; cursor: pointer; transition: all 0.15s; }
  .saved-session-item:hover { border-color: var(--blue); background: var(--blue-dim); }
  .ssi-name { font-weight: 700; font-size: 13px; flex: 1; }
  .ssi-meta { font-size: 11px; color: var(--text-muted); }
  .btn-teal { background: var(--teal); color: #000; }
  .btn-orange { background: var(--orange); color: #000; }
  .req-item { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--orange); border-radius: 6px; padding: 8px 10px; }
  .req-badge { font-size: 10px; font-weight: 800; background: var(--orange-dim); color: var(--orange); border-radius: 20px; padding: 2px 7px; white-space: nowrap; }
  .pair-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 300; }
  .pair-modal { background: var(--surface); border: 1px solid var(--purple); border-radius: 12px; padding: 24px; width: 360px; max-width: 95vw; }
  .pair-modal h2 { font-size: 16px; font-weight: 800; margin-bottom: 4px; color: #ce93d8; }
  .pair-modal p { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }
  .pair-select-list { display: flex; flex-direction: column; gap: 5px; max-height: 200px; overflow-y: auto; margin-bottom: 12px; }
  .pair-select-item { display: flex; align-items: center; gap: 7px; padding: 7px 10px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; font-size: 12px; transition: all 0.15s; }
  .pair-select-item:hover { border-color: var(--purple); }
  .pair-select-item.selected { border-color: var(--purple); background: var(--purple-dim); color: #ce93d8; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const LEVELS = ['Open', 'Beginner', 'Low-Int', 'Intermediate', 'High-Int', 'Advanced'];
const LEVEL_SHORT = { 'Open': 'OPEN', 'Beginner': 'BEG', 'Low-Int': 'L-INT', 'Intermediate': 'INT', 'High-Int': 'H-INT', 'Advanced': 'ADV' };
const LEVEL_IDX = { 'Open': -1, 'Beginner': 0, 'Low-Int': 1, 'Intermediate': 2, 'High-Int': 3, 'Advanced': 4 };
const BADGE_CLASS = { 'Open': 'badge-open', 'Beginner': 'badge-beg', 'Low-Int': 'badge-li', 'Intermediate': 'badge-int', 'High-Int': 'badge-hi', 'Advanced': 'badge-adv' };
const TIME_OPTIONS = [15, 20, 24, 30];
const MATCH_MODES = ['Same Level', 'Skill Based', 'Open Level', 'Manual'];

let nextId = 200;
const uid = () => `p${nextId++}`;

const INIT_PLAYERS = [
  { id: uid(), name: 'Alex', level: 'Beginner', partnerId: null, gender: 'M' },
  { id: uid(), name: 'Sam', level: 'Beginner', partnerId: null, gender: 'F' },
  { id: uid(), name: 'Jordan', level: 'Low-Int', partnerId: null, gender: 'M' },
  { id: uid(), name: 'Casey', level: 'Low-Int', partnerId: null, gender: 'F' },
  { id: uid(), name: 'Riley', level: 'High-Int', partnerId: null, gender: 'M' },
  { id: uid(), name: 'Morgan', level: 'High-Int', partnerId: null, gender: 'F' },
  { id: uid(), name: 'Taylor', level: 'Advanced', partnerId: null, gender: 'M' },
  { id: uid(), name: 'Drew', level: 'Advanced', partnerId: null, gender: 'M' },
  { id: uid(), name: 'Jamie', level: 'Beginner', partnerId: null, gender: 'F' },
  { id: uid(), name: 'Quinn', level: 'Low-Int', partnerId: null, gender: 'M' },
];

function LevelBadge({ level }) {
  return <span className={`badge ${BADGE_CLASS[level] || 'badge-beg'}`}>{LEVEL_SHORT[level] || level}</span>;
}

function GenderTag({ gender }) {
  if (gender === 'F') return <span style={{fontSize:11,fontWeight:800,color:'#f06292',background:'#2a0818',border:'1px solid #e91e6344',borderRadius:20,padding:'1px 6px',flexShrink:0}}>♀</span>;
  return <span style={{fontSize:11,fontWeight:800,color:'#64b5f6',background:'#0d2040',border:'1px solid #2196f344',borderRadius:20,padding:'1px 6px',flexShrink:0}}>♂</span>;
}

function CourtTimer({ startTime, limitMin }) {
  const [elapsed, setElapsed] = useState(0);
  useEffect(() => {
    const iv = setInterval(() => setElapsed(Math.floor((Date.now() - startTime) / 1000)), 1000);
    return () => clearInterval(iv);
  }, [startTime]);
  const limit = limitMin * 60;
  const rem = limit - elapsed;
  const absRem = Math.abs(rem);
  const min = Math.floor(absRem / 60).toString().padStart(2, '0');
  const sec = (absRem % 60).toString().padStart(2, '0');
  const cls = rem < 0 ? 'timer-over' : rem < 120 ? 'timer-warn' : 'timer-ok';
  return <span className={`court-timer ${cls}`}>{rem < 0 ? '-' : ''}{min}:{sec}</span>;
}

function PlayerListTab({ playerList, setPlayerList, playerListSearch, setPlayerListSearch, queue, setQueue, courts, showNotif,
  addingPair, setAddingPair,
  newName, setNewName, newLevel, setNewLevel, newGender, setNewGender,
  newPartnerName, setNewPartnerName, newPartnerLevel, setNewPartnerLevel, newPartnerGender, setNewPartnerGender,
  addPlayer, onJoin
}) {
  const [plEditId, setPlEditId] = useState(null);
  const [plEditName, setPlEditName] = useState('');
  const [plEditLevel, setPlEditLevel] = useState('Open');
  const [plEditGender, setPlEditGender] = useState('M');

  const filtered = playerList.filter(p =>
    !playerListSearch.trim() || p.name.toLowerCase().includes(playerListSearch.trim().toLowerCase())
  );

  const addToWaitlist = (p) => {
    if (queue.some(q => q.id === p.id || q.name.toLowerCase() === p.name.toLowerCase())) {
      showNotif(`${p.name} is already in the waitlist`); return;
    }
    if (onJoin) onJoin(p.id);
    setQueue(prev => [...prev, { ...p }]);
    showNotif(`${p.name} added to Waitlist!`);
  };

  const removeFromPlayerList = (id) => {
    setPlayerList(prev => prev.filter(p => p.id !== id));
    // Also remove from waitlist (queue), unlinking any fixed partner
    setQueue(prev => {
      const target = prev.find(p => p.id === id);
      if (!target) return prev;
      const without = prev.filter(p => p.id !== id);
      if (target.partnerId) {
        return without.map(p => p.id === target.partnerId ? { ...p, partnerId: null } : p);
      }
      return without;
    });
  };

  const saveEdit = (id) => {
    if (!plEditName.trim()) return;
    setPlayerList(prev => prev.map(p => p.id === id
      ? { ...p, name: plEditName.trim(), level: plEditLevel, gender: plEditGender }
      : p
    ));
    setPlEditId(null);
    showNotif('Player updated!');
  };

  return (
    <div className="two-col">
      <div className="card">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,flexWrap:'wrap',gap:6}}>
          <div className="section-title" style={{marginBottom:0}}>Master Player List — {playerList.length} players</div>
        </div>
        <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:10,lineHeight:1.5}}>
          This is your master roster. Add players here, then click <strong style={{color:'var(--green)'}}>+ Waitlist</strong> to put them in today's queue. Removing from the waitlist does not remove them from this list.
        </div>
        <div style={{position:'relative',marginBottom:10}}>
          <span style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)',fontSize:13,color:'var(--text-dim)',pointerEvents:'none'}}>🔍</span>
          <input type="text" placeholder="Search player…" value={playerListSearch}
            onChange={e => setPlayerListSearch(e.target.value)}
            style={{paddingLeft:30,background:'var(--surface3)',border:'1px solid var(--border)',borderRadius:6,fontSize:12,color:'#e8f0fe',width:'100%'}} />
          {playerListSearch && (
            <button onClick={() => setPlayerListSearch('')} style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--text-dim)',cursor:'pointer',fontSize:14,lineHeight:1,padding:0}}>✕</button>
          )}
        </div>
        {filtered.length === 0
          ? <div className="empty-state">{playerList.length === 0 ? 'No players yet. Add some →' : 'No players match search.'}</div>
          : (
            <div className="queue-list" style={{maxHeight:480}}>
              {filtered.map((p, idx) => {
                const inQueue = queue.some(q => q.id === p.id);
                const onCourt = courts.some(c => c.players && [...c.players.teamA,...c.players.teamB].find(x=>x.id===p.id));
                const isEditing = plEditId === p.id;
                return (
                  <div key={p.id} className="queue-item">
                    <span className="queue-num">{idx+1}</span>
                    {!isEditing ? (
                      <>
                        <GenderTag gender={p.gender} />
                        <LevelBadge level={p.level} />
                        <span className="queue-name">{p.name}</span>
                        {inQueue && <span style={{fontSize:10,fontWeight:800,color:'var(--gold)',background:'var(--gold-dim)',borderRadius:10,padding:'1px 6px',flexShrink:0}}>In Queue</span>}
                        {onCourt && <span style={{fontSize:10,fontWeight:800,color:'var(--green)',background:'var(--green-dim)',borderRadius:10,padding:'1px 6px',flexShrink:0}}>On Court</span>}
                        <div style={{display:'flex',gap:4,marginLeft:'auto',flexShrink:0}}>
                          {!inQueue && !onCourt && (
                            <button className="btn btn-green btn-sm" onClick={() => addToWaitlist(p)} title="Add to today's waitlist">+ Waitlist</button>
                          )}
                          <button className="btn btn-ghost btn-sm" onClick={() => { setPlEditId(p.id); setPlEditName(p.name); setPlEditLevel(p.level); setPlEditGender(p.gender); }} title="Edit">✏️</button>

function App() {
  const [numCourts, setNumCourts] = useState(3);
  const [gameTime, setGameTime] = useState(20);
  const [matchMode, setMatchMode] = useState('Same Level');
  const [queue, setQueue] = useState(INIT_PLAYERS);

  const [history, setHistory] = useState([]);

  const [addingPair, setAddingPair] = useState(false);
  const [scoreModal, setScoreModal] = useState(null);
  const [scoringEnabled, setScoringEnabled] = useState(false);
  const [scoreA, setScoreA] = useState('');
  const [scoreB, setScoreB] = useState('');
  const [modalTeamA, setModalTeamA] = useState([]);
  const [modalTeamB, setModalTeamB] = useState([]);

  const [activeTab, setActiveTab] = useState('courts');
  const [manualSelected, setManualSelected] = useState([]);
  const [manualCourt, setManualCourt] = useState(null);
  const [waitlistSearch, setWaitlistSearch] = useState('');
  const [playerListSearch, setPlayerListSearch] = useState('');
  const [playerList, setPlayerList] = useState(INIT_PLAYERS.map(p => ({...p})));
  const [manualSearch, setManualSearch] = useState('');
  const [reqSearch, setReqSearch] = useState('');
  const [pairSearch, setPairSearch] = useState('');
  const [editingPlayerId, setEditingPlayerId] = useState(null);
  const [rearrangeCourt, setRearrangeCourt] = useState(null); // courtId being rearranged
  const [dragPlayerId, setDragPlayerId] = useState(null);     // id of player being dragged
  const [replacingPlayer, setReplacingPlayer] = useState(null); // { courtId, playerId } — sub-out mode
  const [editingPlayerName, setEditingPlayerName] = useState('');
  const [editingPlayerLevel, setEditingPlayerLevel] = useState('Open');
  const [simModal, setSimModal] = useState(false);
  const [simGames, setSimGames] = useState('96');
  const [simRunning, setSimRunning] = useState(false);
  const [simProgress, setSimProgress] = useState(0);
  const [simTarget, setSimTarget] = useState(0);
  const notifTimer = useRef(null);
  const assignCount = useRef(0); // counts auto-assigns to schedule mixed doubles every 3rd game
  const sbMixedCount = useRef(0); // tracks Skill Based mixed-gender rotation
  const olSameGenderStreak = useRef(0); // Open Level: consecutive same-gender games streak

  // ── Sorting state for grid views ──────────────────────────────────────
  const [historySort, setHistorySort] = useState({ col: null, dir: 'asc' });
  const [statsSort, setStatsSort] = useState({ col: 'wins', dir: 'desc' });
  const [queueSort, setQueueSort] = useState({ col: null, dir: 'asc' });

  const toggleSort = (currentSort, setSort, col) => {
    setSort(prev => prev.col === col
      ? { col, dir: prev.dir === 'asc' ? 'desc' : 'asc' }
      : { col, dir: col === 'wins' || col === 'games' || col === 'winPct' || col === 'diff' ? 'desc' : 'asc' }
    );
  };

  const SortIcon = ({ sort, col }) => {
    if (sort.col !== col) return <span style={{opacity:0.25,marginLeft:3,fontSize:9}}>⇅</span>;
    return <span style={{marginLeft:3,fontSize:9,color:'var(--gold)'}}>{sort.dir === 'asc' ? '▲' : '▼'}</span>;
  };

  // ── Pairing history (partner + opponent repeat avoidance) ────────────
  // Flat map: "idA|idB" (sorted) → number of times they shared a court.
  // Incremented when a game is recorded. Used to score candidate matches
  // so the algorithm prefers combos where players haven't faced/partnered before.
  const pairingHistory = useRef({}); // { "id1|id2": count, ... }

  const phKey = (a, b) => [a, b].sort().join('|');

  const phGet = (a, b) => pairingHistory.current[phKey(a, b)] || 0;

  const phRecord = (teamA, teamB) => {
    const bump = (a, b) => {
      const k = phKey(a, b);
      pairingHistory.current[k] = (pairingHistory.current[k] || 0) + 1;
    };
    // Partners
    if (teamA[0] && teamA[1]) bump(teamA[0].id, teamA[1].id);
    if (teamB[0] && teamB[1]) bump(teamB[0].id, teamB[1].id);
    // Opponents (all cross-team pairs)
    for (const pA of teamA) for (const pB of teamB) bump(pA.id, pB.id);
  };

  // (lastPlayedTime removed — time-based cooldowns must not affect matchmaking)
  // ── Games-played tracking (balances total game count across all players) ──
  const gamesPlayedRef = useRef({}); // { playerId: count }
  // ── Join-round tracking: fairness relative to when each player joined ──
  // joinRoundRef[playerId] = value of roundsFiredRef when they first joined the session.
  // This ensures late arrivals are compared fairly — a player who joined at round 6
  // is NOT penalized for having fewer games than someone who joined at round 0.
  const joinRoundRef = useRef({});  // { playerId: roundNumber }
  const roundsFiredRef = useRef(0); // total games fired since session start

  // Score a candidate match: sum of all pairings among the 4 players.
  // Lower = fresher. Partner pairs weighted 2× to more strongly avoid
  // repeating the same partner vs the same opponent.
  // Also adds a heavy penalty for players who just finished a game (< cooldownMs ago).
  // scoreMatch: pure pairing-history freshness score.
  // Lower = fewer repeated partner/opponent combos = preferred match.
  // Scoring and time-based cooldowns are intentionally excluded —
  // the scoring feature is for recording only and must not affect matchmaking.
  // Freshness score for a candidate match.
  // Primary: max repeat count across ALL 6 pairs (partner + opponent).
  //   → A combo where ANY two players have met before scores worse than one where everyone is new.
  //   → Ensures fresh partner AND fresh opponents, not just shuffling one piece.
  // Secondary (tiebreak): total repeat count across all pairs.
  //   → Among combos with the same worst pair, prefer the one with fewer repeats overall.
  // Returns [maxRepeat, totalRepeats] — sort ascending on both.
  const scoreMatch = (teamA, teamB) => {
    const pairs = [
      phGet(teamA[0].id, teamA[1].id), // partner A
      phGet(teamB[0].id, teamB[1].id), // partner B
      phGet(teamA[0].id, teamB[0].id), // opponents
      phGet(teamA[0].id, teamB[1].id),
      phGet(teamA[1].id, teamB[0].id),
      phGet(teamA[1].id, teamB[1].id),
    ];
    const maxRepeat = Math.max(...pairs);
    const totalRepeats = pairs.reduce((s, v) => s + v, 0);
    // Pack into a single comparable number: maxRepeat dominates, totalRepeats breaks ties
    return maxRepeat * 1000 + totalRepeats;
  };



  // ── Requested games queue ────────────────────────────────────────────
  const [requestedGames, setRequestedGames] = useState([]); // [{ id, playerIds, addedAt }]

  // ── Pair-link modal (set/remove fixed partner on existing players) ───
  const [pairModal, setPairModal] = useState(null); // null | { playerId }
  const [pairTarget, setPairTarget] = useState(null); // id of chosen partner
  const [reqSelected, setReqSelected] = useState([]); // players selected for a new requested game

  // ── Session management ──────────────────────────────────────────────
  const [sessionName, setSessionName] = useState(() => {
    try { return JSON.parse(localStorage.getItem('dr_current_session_name')) || 'Session 1'; } catch { return 'Session 1'; }
  });
  const [sessionStarted, setSessionStarted] = useState(() => {
    try { return localStorage.getItem('dr_session_started') || new Date().toISOString(); } catch { return new Date().toISOString(); }
  });
  const [sessionModal, setSessionModal] = useState(null); // null | 'save' | 'new' | 'load'
  const [savedSessions, setSavedSessions] = useState(() => {
    try { return JSON.parse(localStorage.getItem('dr_saved_sessions')) || []; } catch { return []; }
  });
  const [newSessionName, setNewSessionName] = useState('');
  const [lastSaved, setLastSaved] = useState(null);
  const previewWinRef = useRef(null);
  const [autoPreview, setAutoPreview] = useState(false);
  const [autoAlert, setAutoAlert] = useState(false);
  const [showUpNext, setShowUpNext] = useState(false);
  const prevCourtsRef = useRef(courts);

  // Send alert overlay to the preview window instead of opening a separate popup.
  // If the preview window isn't open yet, open it first then send the alert once ready.
  const sendAlertToPreview = (courtId, teamA, teamB) => {
    const payload = { type: 'DR_ALERT', courtId, teamA, teamB };

    const sendTo = (win) => {
      try { win.postMessage(payload, '*'); } catch(e) {}
    };

    if (previewWinRef.current && !previewWinRef.current.closed) {
      sendTo(previewWinRef.current);
    } else {
      // Open the preview window first, then send the alert after it's ready
      openPreviewWindow();
      const attempts = [600, 1200, 2000];
      attempts.forEach(ms => setTimeout(() => {
        if (previewWinRef.current && !previewWinRef.current.closed) sendTo(previewWinRef.current);
      }, ms));
    }
  };

  // Auto-open preview window when a court becomes active (game started), if autoPreview is on
  // Auto-open alert window when a court becomes active, if autoAlert is on
  useEffect(() => {
    const prevActive = prevCourtsRef.current.filter(c => c.players).length;
    const nowActive = courts.filter(c => c.players).length;
    if (nowActive > prevActive) {
      if (autoPreview) openPreviewWindow();
      if (autoAlert) {
        const newCourt = courts.find(c => c.players && !prevCourtsRef.current.find(pc => pc.id === c.id && pc.players));
        if (newCourt) sendAlertToPreview(newCourt.id, newCourt.players.teamA, newCourt.players.teamB);
      }
    }
    prevCourtsRef.current = courts;
  }, [courts, autoPreview, autoAlert]);

  // Listen for preview window signalling it's ready, then push current state
  useEffect(() => {
    const handler = (e) => {
      if (e.data && e.data.type === 'DR_PREVIEW_READY' && previewWinRef.current && !previewWinRef.current.closed) {
        try {
          previewWinRef.current.postMessage(
            { type: 'DR_PREVIEW_UPDATE', courts, gameTime, sessionName, upNext: computeUpNext() }, '*'
          );
        } catch(err) {}
      }
    };
    window.addEventListener('message', handler);
    return () => window.removeEventListener('message', handler);
  }, [courts, gameTime, sessionName]);

  // Push state to preview window whenever courts/gameTime/sessionName change
  useEffect(() => {
    if (previewWinRef.current && !previewWinRef.current.closed) {
      try {
        previewWinRef.current.postMessage(
          { type: 'DR_PREVIEW_UPDATE', courts, gameTime, sessionName, upNext: computeUpNext() }, '*'
        );
      } catch(e) {}
    }
  }, [courts, gameTime, sessionName]);

  // Compute upNext matches for the preview window — mirrors the Up Next preview logic
  const computeUpNext = () => {
    if (matchMode === 'Manual') return [];
    const upNextMatches = [];
    // Cap to first 20 players — avoids O(n⁴) hang with large rosters.
    let simQueue = queue.slice(0, 20);
    let simAssignCount = assignCount.current;
    let simSbMixedCount = sbMixedCount.current;
    let simOlStreak = olSameGenderStreak.current;
    for (let n = 0; n < 2; n++) {
      if (simQueue.length < 4) break;
      simAssignCount += 1;
      let forceMixed = false;
      if (matchMode === 'Same Level') forceMixed = simAssignCount % 3 === 0;
      if (matchMode === 'Open Level') forceMixed = simOlStreak >= 2;
      if (matchMode === 'Skill Based') { simSbMixedCount += 1; forceMixed = simSbMixedCount % 3 === 0; }
      let simPriorityIds = null;
      for (const req of requestedGames) {
        if (!req.readyToFire) continue;
        const positions = req.playerIds.map(id => simQueue.findIndex(p => p.id === id));
        if (positions.some(pos => pos === -1)) continue;
        const maxPos = Math.max(...positions);
        const othersAhead = simQueue.slice(0, maxPos).filter(p => !req.playerIds.includes(p.id)).length;
        if (othersAhead === 0) { simPriorityIds = req.playerIds; break; }
      }
      const m = findMatch(simQueue, matchMode, forceMixed, simPriorityIds);
      if (!m) break;
      upNextMatches.push(m);
      simQueue = simQueue.filter(p => !m.ids.includes(p.id));
    }
    return upNextMatches;
  };

  const openPreviewWindow = () => {
    if (previewWinRef.current && !previewWinRef.current.closed) {
      previewWinRef.current.focus();
      try {
        previewWinRef.current.postMessage(
          { type: 'DR_PREVIEW_UPDATE', courts, gameTime, sessionName, upNext: computeUpNext() }, '*'
        );
      } catch(e) {}
      return;
    }
    const previewHTML = buildPreviewHTML();
    const blob = new Blob([previewHTML], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const win = window.open(url, 'DinkPreview', 'width=1200,height=750,resizable=yes,scrollbars=yes');
    previewWinRef.current = win;
    const courtsSnap = courts, gtSnap = gameTime, snSnap = sessionName;
    const sendInitial = () => {
      try { win.postMessage({ type: 'DR_PREVIEW_UPDATE', courts: courtsSnap, gameTime: gtSnap, sessionName: snSnap, upNext: computeUpNext() }, '*'); } catch(e) {}
    };
    setTimeout(sendInitial, 400);
    setTimeout(sendInitial, 900);
    setTimeout(sendInitial, 1800);
    showNotif('Preview window opened!');
  };

      const levelBalance = (tA, tB) => {
        const lvl = (p) => LEVEL_IDX[p.level] ?? 1;
        const avgA = tA.reduce((s, p) => s + lvl(p), 0) / tA.length;
        const avgB = tB.reduce((s, p) => s + lvl(p), 0) / tB.length;
        return Math.abs(avgA - avgB);
      };

      // Worst (highest) queue position in the group — lower is better.
      // This penalises combos that include someone who just joined or returned,
      // naturally surfacing groups where everyone has waited a long time.
      const worstQpos = (players) => Math.max(...players.map(p => qpos[p.id] ?? 999));

      const bestSplitForCombo = (players) => {
        const fc = players.filter(p => p.gender === 'F').length;
        const candidates = [];
        for (const [a,b,c,d] of splits) {
          const tA = [players[a], players[b]], tB = [players[c], players[d]];
          if (!partnersRespected(tA, tB, mode)) continue;
          const fA = tA.filter(p => p.gender === 'F').length;
          const isMixed  = fc === 2 && fA === 1;
          const genderOk = (fc === 2 && isMixed) || fc === 0 || fc === 4;
          const wantedGender = forceMixed ? (isMixed ? 0 : 1) : (isMixed ? 1 : 0);
          const type = isMixed ? 'mixed' : fc === 4 ? 'womens' : fc === 0 ? 'mens' : 'uneven';
          candidates.push({
            teamA: tA, teamB: tB,
            ids: players.map(p => p.id),
            type, genderOk, wantedGender,
            levelBal: levelBalance(tA, tB),
            waitScore: worstQpos(players),
            fresh: scoreMatch(tA, tB),
          });
        }
        if (!candidates.length) return null;
        candidates.sort((x, y) =>
          (y.genderOk - x.genderOk) ||
          (x.wantedGender - y.wantedGender) ||
          (x.levelBal - y.levelBal) ||
          (x.waitScore - y.waitScore) ||
          (x.fresh - y.fresh)
        );
        return candidates[0];
      };

      const combos = [];
      for (let i = 0; i < pool.length - 3; i++)
      for (let j = i+1; j < pool.length - 2; j++)
      for (let k = j+1; k < pool.length - 1; k++)
      for (let l = k+1; l < pool.length; l++) {
        const c = bestSplitForCombo([pool[i], pool[j], pool[k], pool[l]]);
        if (c) combos.push(c);
      }

      if (!combos.length) return null;

      combos.sort((x, y) =>
        (y.genderOk - x.genderOk) ||
        (x.wantedGender - y.wantedGender) ||
        (x.levelBal - y.levelBal) ||
        (x.waitScore - y.waitScore) ||
        (x.fresh - y.fresh)
      );

      return combos[0];
    }

    // ── SAME LEVEL MODE ───────────────────────────────────────────────
    if (mode === 'Same Level') {
      const tryCombo = (players, isSameGenderOnly) => {
        const femaleCount = players.filter(p => p.gender === 'F').length;
        if (isSameGenderOnly && femaleCount !== 0 && femaleCount !== 4) return null;
        const splits = [[0,1,2,3],[0,2,1,3],[0,3,1,2]];
        let best = null, bestScore = Infinity;
        for (const [a,b,c,d] of splits) {
          const tA = [players[a], players[b]], tB = [players[c], players[d]];
          if (teamCompatible(tA, tB, mode) && partnersRespected(tA, tB, mode)) {
            const s = scoreMatch(tA, tB);
            if (s < bestScore) { best = { teamA: tA, teamB: tB, ids: players.map(p => p.id) }; bestScore = s; }
          }
        }
        return best;
      };

      // Collect all valid 4-player groups anchored to sorted[0]
      const collectSameLevel = (isSameGenderOnly, requireMixed) => {
        const candidates = [];
        for (let i = 0; i < (priorityIds ? 1 : sorted.length - 3); i++)
        for (let j = i+1; j < sorted.length - 2; j++)
        for (let k = j+1; k < sorted.length - 1; k++)
        for (let l = k+1; l < sorted.length; l++) {
          const players = [sorted[i],sorted[j],sorted[k],sorted[l]];
          if (requireMixed && players.filter(p=>p.gender==='F').length !== 2) continue;
          const r = tryCombo(players, isSameGenderOnly);
          if (r) candidates.push(r);
        }
        return candidates;
      };

      if (!forceMixed) {
        const c = collectSameLevel(true, false);
        if (c.length) return pickBest(c);
      }
      const c2 = collectSameLevel(false, forceMixed);
      if (c2.length) return pickBest(c2);
      if (forceMixed) {
        const c3 = collectSameLevel(false, false);
        if (c3.length) return pickBest(c3);
      }
      return null;
    }

    // ── SKILL BASED MODE ─────────────────────────────────────────────
    // Priority stack:
    //   1. Level span ≤ 1 (adjacent levels only; widens to ≤2 then any as fallback)
    //   2. Join-adjusted deficit (same fairness metric as Open Level — who is most owed)
    //   3. Max individual games (prevent any one player pulling far ahead)
    //   4. Queue anchor — prefer combos that include the longest-waiting player
    //      (soft, only breaks ties after fairness is satisfied)
    //   5. Gender rotation (wantMixed preference, falls back gracefully)
    //   6. Pairing freshness (final tiebreaker)
    if (mode === 'Skill Based') {
      const activeCount = Math.max(4, sorted.length);
      const expectedRate = Math.min(1.0, 4 / activeCount);

      const getDeficit = (p) => {
        const joinRound = joinRoundRef.current[p.id] ?? 0;
        const roundsAvailable = Math.max(0, roundsFiredRef.current - joinRound);
        return (roundsAvailable * expectedRate) - (gamesPlayedRef.current[p.id] || 0);
      };

      const groupDeficit = (c) =>
        [...c.teamA, ...c.teamB].reduce((sum, p) => sum + getDeficit(p), 0);

      const maxIndividualGames = (c) =>
        Math.max(...[...c.teamA, ...c.teamB].map(p => gamesPlayedRef.current[p.id] || 0));

      // Collect all valid combos at a given level span and gender preference.
      // wantMixed=true → mixed doubles only
      // wantMixed=false → same-gender only
      // wantMixed=null → either
      const collectSB = (maxSpan, wantMixed) => {
        const candidates = [];
        for (let i = 0; i < sorted.length - 3; i++)
        for (let j = i+1; j < sorted.length - 2; j++)
        for (let k = j+1; k < sorted.length - 1; k++)
        for (let l = k+1; l < sorted.length; l++) {
          const players = [sorted[i], sorted[j], sorted[k], sorted[l]];
          const idxs = players.map(p => LEVEL_IDX[p.level] < 0 ? 0 : LEVEL_IDX[p.level]);
          if (Math.max(...idxs) - Math.min(...idxs) > maxSpan) continue;
          const result = sbTrySplit(players, wantMixed);
          if (result) candidates.push(result);
        }
        return candidates;
      };

      // Apply fairness filtering then pick best from a candidate pool.
      // Returns null if pool is empty.
      const pickFair = (candidates) => {
        if (!candidates.length) return null;
        const TOLERANCE = 0.05;

        // Step 1: maximize group deficit (most owed a game, join-adjusted)
        const maxDef = Math.max(...candidates.map(groupDeficit));
        const fairPool = candidates.filter(c => groupDeficit(c) >= maxDef - TOLERANCE);

        // Step 2: minimize max individual games
        const minMax = Math.min(...fairPool.map(maxIndividualGames));
        const balancedPool = fairPool.filter(c => maxIndividualGames(c) === minMax);

        // Step 3: soft anchor — prefer combos containing sorted[0] (longest-waiting)
        const withAnchor = balancedPool.filter(c =>
          [...c.teamA, ...c.teamB].some(p => p.id === sorted[0].id));
        const anchorPool = withAnchor.length ? withAnchor : balancedPool;

        // Step 4: pairing freshness tiebreaker
        return pickBest(anchorPool);
      };

      // Pass 1: span ≤ 1, desired gender
      let result = pickFair(collectSB(1, forceMixed));
      if (result) return result;

      // Pass 2: span ≤ 1, opposite gender
      result = pickFair(collectSB(1, !forceMixed));
      if (result) return result;

      // Pass 3: span ≤ 2, desired gender first, then opposite
      result = pickFair(collectSB(2, forceMixed));
      if (result) return result;
      result = pickFair(collectSB(2, !forceMixed));
      if (result) return result;

      // Pass 4: any span, any gender
      return pickFair(collectSB(99, null));
    }

    return null;
  };

  // ── Requested Games helpers ───────────────────────────────────────────
  const addRequestedGame = (playerIds) => {
    if (playerIds.length !== 4) return;
    // Snapshot every OTHER player in the session right now (queue + on-court).
    // The requested game only auto-fires after ALL of these players have had
    // at least one game since this request was added — i.e. they've had their turn.
    const allSessionIds = [
      ...queue.map(p => p.id),
      ...courts.flatMap(c => c.players ? [...c.players.teamA, ...c.players.teamB].map(p => p.id) : [])
    ];
    const otherPlayerIds = allSessionIds.filter(id => !playerIds.includes(id));
    // For each other player, record their current game count as baseline.
    // They've "had their turn" once their count exceeds this baseline.
    // NOTE: Recompute stats fresh from history here — the render-time `playerStats`
    // may be stale if called right after a score submission (state not yet flushed).
    const freshStats = {};
    history.forEach(g => {
      [...g.teamA, ...g.teamB].forEach(p => {
        if (!freshStats[p.id]) freshStats[p.id] = { games: 0 };
        freshStats[p.id].games++;
      });
    });
    const otherBaselines = {};
    otherPlayerIds.forEach(id => {
      otherBaselines[id] = freshStats[id]?.games || 0;
    });
    setRequestedGames(prev => [...prev, {
      id: Date.now(),
      playerIds,
      addedAt: Date.now(),
      otherBaselines, // { playerId: gamesAtRequestTime }
    }]);
    showNotif(`Requested game added! Fires after all ${otherPlayerIds.length} other players have had their turn.`);
  };

  const removeRequestedGame = (id) => {
    setRequestedGames(prev => prev.filter(r => r.id !== id));
  };

  // ── Pair-link helpers (set/remove fixed partner on existing players) ──
  const linkPartners = (idA, idB) => {
    setQueue(prev => prev.map(p => {
      if (p.id === idA) return { ...p, partnerId: idB };
      if (p.id === idB) return { ...p, partnerId: idA };
      return p;
    }));
    showNotif('Fixed pair linked!');
  };

  const unlinkPartner = (id) => {
    setQueue(prev => {
      const target = prev.find(p => p.id === id);
      const partnerId = target?.partnerId;
      return prev.map(p => {
        if (p.id === id || p.id === partnerId) return { ...p, partnerId: null };
        return p;
      });
    });
    showNotif('Fixed pair removed.');
  };

  const autoAssign = (targetCourtId) => {
    if (matchMode === 'Manual') { showNotif('Switch to Auto mode or use Assign Manually on a court'); return; }
    const open = targetCourtId
      ? courts.find(c => c.id === targetCourtId && !c.players)
      : courts.find(c => !c.players);
    if (!open) { showNotif('No open courts available'); return; }
    if (queue.length < 4) { showNotif('Need at least 4 players in queue'); return; }

    assignCount.current += 1;
    let forceMixed = false;
    if (matchMode === 'Same Level') {
      forceMixed = assignCount.current % 3 === 0;
    }
    if (matchMode === 'Open Level') {
      forceMixed = olSameGenderStreak.current >= 2;
    }
    if (matchMode === 'Skill Based') {
      sbMixedCount.current += 1;
      forceMixed = sbMixedCount.current % 3 === 0;
    }

    // Check if any readyToFire requested game has all 4 players already
    // at the very front of the queue (no one waiting ahead of them is being
    // skipped). We define "at the front" as: every one of the 4 players
    // appears within the first (queuePosition + 3) slots — meaning no other
    // players are ahead of the last of the 4. This prevents skipping players
    // who registered or returned earlier.
    let priorityIds = null;
    let firedReqId = null;
    for (const req of requestedGames) {
      if (!req.readyToFire) continue;
      const positions = req.playerIds.map(id => queue.findIndex(p => p.id === id));
      if (positions.some(pos => pos === -1)) continue; // some not in queue yet
      const maxPos = Math.max(...positions);
      // Count how many queue members are NOT part of this requested game
      // and sit BEFORE the last of the 4 players.
      const othersAhead = queue.slice(0, maxPos).filter(p => !req.playerIds.includes(p.id)).length;
      if (othersAhead === 0) {
        // All 4 are at the front — no one is being skipped
        priorityIds = req.playerIds;
        firedReqId = req.id;
        break;
      }
    }

    const match = findMatch(queue, matchMode, forceMixed, priorityIds);
    if (!match) { showNotif(`No valid match found for "${matchMode}" mode`); return; }
    const { teamA, teamB, ids } = match;
    setCourts(prev => prev.map(c => c.id === open.id ? { ...c, players: { teamA, teamB }, startTime: Date.now() } : c));
    setQueue(prev => prev.filter(p => !ids.includes(p.id)));
    if (firedReqId) setRequestedGames(prev => prev.filter(r => r.id !== firedReqId));
    roundsFiredRef.current += 1;
    const fCount = [...teamA, ...teamB].filter(p => p.gender === 'F').length;
    const matchType = matchMode === 'Open Level'
      ? 'Open Levels'
      : fCount === 2 ? 'Mixed Doubles' : fCount === 4 ? "Women's Doubles" : "Men's Doubles";
    const reqLabel = firedReqId ? '🎯 Requested ' : '';
    showNotif(`Court ${open.id} — ${reqLabel}${matchType} started!`);
  };

  // ── Start a specific requested game on an open court ─────────────────
  // This is SEPARATE from Auto Assign. It pulls the 4 players from wherever
  // they are (queue or just returned from court) and fills an open court.
  // It does NOT touch the rest of the queue order at all.
  const startRequestedGame = (req) => {
    const open = courts.find(c => !c.players);
    if (!open) { showNotif('No open courts — end a game first'); return; }
    // Collect the 4 players from the queue
    const players = req.playerIds.map(id => queue.find(p => p.id === id)).filter(Boolean);
    if (players.length !== 4) {
      showNotif('Not all 4 players are free in the queue yet'); return;
    }
    const [p1, p2, p3, p4] = players;
    const teamA = [p1, p2], teamB = [p3, p4];
    const ids = req.playerIds;
    setCourts(prev => prev.map(c => c.id === open.id ? { ...c, players: { teamA, teamB }, startTime: Date.now() } : c));
    setQueue(prev => prev.filter(p => !ids.includes(p.id)));
    setRequestedGames(prev => prev.filter(r => r.id !== req.id));
    roundsFiredRef.current += 1;
    const fCount = players.filter(p => p.gender === 'F').length;
    const matchType = fCount === 2 ? 'Mixed Doubles' : fCount === 4 ? "Women's Doubles" : "Men's Doubles";
    showNotif(`Court ${open.id} — 🎯 Requested ${matchType} started!`);
  };

  // ── Test Simulation ──────────────────────────────────────────────────
  const runSimulation = (targetGames) => {
    if (matchMode === 'Manual') { showNotif('Switch to Auto mode to run simulation'); return; }
    setSimModal(false);
    setSimRunning(true);
    setSimProgress(0);
    setSimTarget(targetGames);

    let localQueue = [...queue];
    let localCourts = courts.map(c => ({ ...c }));
    let localHistory = [...history];
    let localAssignCount = assignCount.current;
    let localSbMixedCount = sbMixedCount.current;
    let localOlStreak = olSameGenderStreak.current;
    let gamesCompleted = 0;

    const step = () => {
      if (gamesCompleted >= targetGames) {
        setQueue(localQueue);
        setCourts(localCourts);
        setHistory(localHistory);
        assignCount.current = localAssignCount;
        sbMixedCount.current = localSbMixedCount;
        olSameGenderStreak.current = localOlStreak;
        setSimRunning(false);
        setSimProgress(targetGames);
        showNotif('Simulation done! ' + gamesCompleted + ' games completed.');
        return;
      }

      // Fill all open courts
      let filledAny = false;
      for (let ci = 0; ci < localCourts.length; ci++) {
        if (localCourts[ci].players) continue;
        if (localQueue.length < 4) break;
        localAssignCount += 1;
        let forceMixed = false;
        if (matchMode === 'Same Level') forceMixed = localAssignCount % 3 === 0;
        if (matchMode === 'Open Level') forceMixed = localOlStreak >= 2;
        if (matchMode === 'Skill Based') { localSbMixedCount += 1; forceMixed = localSbMixedCount % 3 === 0; }
        const match = findMatch(localQueue.slice(0, 20), matchMode, forceMixed, null);
        if (!match) break;
        const { teamA, teamB, ids } = match;
        localCourts[ci] = { ...localCourts[ci], players: { teamA, teamB }, startTime: Date.now() };
        localQueue = localQueue.filter(p => !ids.includes(p.id));
        filledAny = true;
      }

      // End games on all active courts with proper pickleball scores
      let endedAny = false;
      for (let ci = 0; ci < localCourts.length; ci++) {
        if (!localCourts[ci].players || gamesCompleted >= targetGames) continue;
        const { teamA, teamB } = localCourts[ci].players;
        // Generate a realistic pickleball score: winner gets 11, loser gets 0-10
        // If loser gets 10, winner must get 12 (win by 2)
        const loserScore = Math.floor(Math.random() * 11); // 0–10
        const winnerScore = loserScore === 10 ? 12 : 11;
        const teamAWins = Math.random() < 0.5;
        const sA = teamAWins ? winnerScore : loserScore;
        const sB = teamAWins ? loserScore : winnerScore;
        const winner = sA > sB ? 'A' : 'B';
        localHistory.push({
          id: Date.now() + ci + gamesCompleted,
          courtId: localCourts[ci].id,
          teamA, teamB, scoreA: sA, scoreB: sB, winner,
          duration: Math.floor(Math.random() * 10) + gameTime - 5,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        });
        localQueue = [...localQueue, ...teamA, ...teamB];
        // Track games played for fairness scoring
        [...teamA, ...teamB].forEach(p => {
          gamesPlayedRef.current[p.id] = (gamesPlayedRef.current[p.id] || 0) + 1;
          
        });
        // Update Open Level gender streak
        if (matchMode === 'Open Level') {
          const fCount = [...teamA, ...teamB].filter(p => p.gender === 'F').length;
          const isMixed = fCount === 2;
          localOlStreak = isMixed ? 0 : localOlStreak + 1;
        }
        localCourts[ci] = { ...localCourts[ci], players: null, startTime: null };
        gamesCompleted++;
        endedAny = true;
      }

      setSimProgress(gamesCompleted);

      if (!filledAny && !endedAny) {
        setQueue(localQueue);
        setCourts(localCourts);
        setHistory(localHistory);
        setSimRunning(false);
        showNotif('Simulation stopped at ' + gamesCompleted + ' — no valid match found.');
        return;
      }

      setTimeout(step, 0);
    };

    setTimeout(step, 50);
  };
  // ─────────────────────────────────────────────────────────────────────

  const startManual = (courtId) => { setManualCourt(courtId); setManualSelected([]); };

  const toggleManualPlayer = (p) => {
    setManualSelected(prev =>
      prev.find(x => x.id === p.id)
        ? prev.filter(x => x.id !== p.id)
        : prev.length < 4 ? [...prev, p] : prev
    );
  };

  const confirmManual = () => {
    if (manualSelected.length !== 4) { showNotif('Select exactly 4 players'); return; }
    const [p1, p2, p3, p4] = manualSelected;
    const tA = [p1, p2], tB = [p3, p4];
    if (!genderValid(tA, tB, matchMode)) {
      showNotif('❌ Invalid gender mix! If a female is present, each team must have exactly 1 female (mixed doubles only).');
      return;
    }
    const ids = manualSelected.map(p => p.id);
    setCourts(prev => prev.map(c => c.id === manualCourt
      ? { ...c, players: { teamA: tA, teamB: tB }, startTime: Date.now() } : c));
    setQueue(prev => prev.filter(p => !ids.includes(p.id)));
    setManualCourt(null); setManualSelected([]);
    roundsFiredRef.current += 1;
    const fCntM = [...tA, ...tB].filter(p => p.gender === 'F').length;
    const matchTypeM = matchMode === 'Open Level'
      ? 'Open Levels'
      : fCntM === 2 ? 'Mixed Doubles' : fCntM === 4 ? "Women's Doubles" : "Men's Doubles";
    showNotif(`Court ${manualCourt} — ${matchTypeM} started!`);
  };

  const endGame = (courtId) => {
    const court = courts.find(c => c.id === courtId);
    if (!court?.players) return;
    setScoreModal({ courtId, players: court.players, startTime: court.startTime });
    setModalTeamA([...court.players.teamA]);
    setModalTeamB([...court.players.teamB]);
    setScoreA(''); setScoreB('');
  };

  // Swap two players on a court (used during live rearrange)
  const swapCourtPlayers = (courtId, idA, idB) => {
    setCourts(prev => prev.map(c => {
      if (c.id !== courtId || !c.players) return c;
      const allPlayers = [...c.players.teamA, ...c.players.teamB];
      const pA = allPlayers.find(p => p.id === idA);
      const pB = allPlayers.find(p => p.id === idB);
      if (!pA || !pB) return c;
      const newTeamA = c.players.teamA.map(p => p.id === idA ? pB : p.id === idB ? pA : p);
      const newTeamB = c.players.teamB.map(p => p.id === idA ? pB : p.id === idB ? pA : p);
      return { ...c, players: { teamA: newTeamA, teamB: newTeamB } };
    }));
  };

  // Replace a player on a court with a player from the queue.
  // The removed player goes back to the front of the queue (they just sat down).
  const replaceCourtPlayer = (courtId, outPlayerId, inPlayer) => {
    const court = courts.find(c => c.id === courtId);
    if (!court?.players) return;
    const allOnCourt = [...court.players.teamA, ...court.players.teamB];
    const outPlayer = allOnCourt.find(p => p.id === outPlayerId);

    setCourts(prev => prev.map(c => {
      if (c.id !== courtId || !c.players) return c;
      const newTeamA = c.players.teamA.map(p => p.id === outPlayerId ? inPlayer : p);
      const newTeamB = c.players.teamB.map(p => p.id === outPlayerId ? inPlayer : p);
      return { ...c, players: { teamA: newTeamA, teamB: newTeamB } };
    }));
    // Remove replacement from queue; put removed player at front so they're next up
    setQueue(prev => {
      const withoutIn = prev.filter(p => p.id !== inPlayer.id);
      return outPlayer ? [outPlayer, ...withoutIn] : withoutIn;
    });
    setReplacingPlayer(null);
    showNotif(`${inPlayer.name} subbed in for ${outPlayer?.name || 'player'}!`);
  };

  // Auto-remove a player from an active court and fill the slot using
  // the same pairing-score algorithm. The removed player goes front of queue.
  const autoRemoveAndReplace = (courtId, outPlayerId) => {
    const court = courts.find(c => c.id === courtId);
    if (!court?.players) return;
    if (queue.length === 0) { showNotif('No players in queue to replace with!'); return; }

    const allOnCourt = [...court.players.teamA, ...court.players.teamB];
    const outPlayer = allOnCourt.find(p => p.id === outPlayerId);
    if (!outPlayer) return;

    const inTeamA = court.players.teamA.some(p => p.id === outPlayerId);
    const remainingTeamA = court.players.teamA.filter(p => p.id !== outPlayerId);
    const remainingTeamB = court.players.teamB.filter(p => p.id !== outPlayerId);

    // Try each queue candidate; pick lowest pairing-history score
    // that also passes gender validation for the current mode
    let bestCandidate = null;
    let bestScore = Infinity;

    for (const candidate of queue) {
      const proposedTeamA = inTeamA ? [...remainingTeamA, candidate] : remainingTeamA;
      const proposedTeamB = inTeamA ? remainingTeamB : [...remainingTeamB, candidate];
      if (!genderValid(proposedTeamA, proposedTeamB, matchMode)) continue;
      const score = scoreMatch(proposedTeamA, proposedTeamB);
      if (score < bestScore) { bestScore = score; bestCandidate = candidate; }
    }

    // Fallback: no gender-valid candidate found, just use first in queue
    if (!bestCandidate) bestCandidate = queue[0];

    setCourts(prev => prev.map(c => {
      if (c.id !== courtId || !c.players) return c;
      const newTeamA = c.players.teamA.map(p => p.id === outPlayerId ? bestCandidate : p);
      const newTeamB = c.players.teamB.map(p => p.id === outPlayerId ? bestCandidate : p);
      return { ...c, players: { teamA: newTeamA, teamB: newTeamB } };
    }));

    setQueue(prev => {
      const withoutIn = prev.filter(p => p.id !== bestCandidate.id);
      return outPlayer ? [outPlayer, ...withoutIn] : withoutIn;
    });
    setReplacingPlayer(null);
    const msg = 'Auto-filled: ' + bestCandidate.name + ' in for ' + outPlayer.name + '!';
    showNotif(msg);
  };

  const submitScore = () => {
    if (!scoreModal) return;
    const sA = scoringEnabled ? (parseInt(scoreA) || 0) : 0;
    const sB = scoringEnabled ? (parseInt(scoreB) || 0) : 0;
    const { courtId, startTime } = scoreModal;
    const duration = startTime ? Math.floor((Date.now() - startTime) / 60000) : 0;
    const winner = sA > sB ? 'A' : sB > sA ? 'B' : 'tie';

    // Record pairings BEFORE updating state so history is live for next findMatch
    phRecord(modalTeamA, modalTeamB);
    // Record last-played timestamp and games count
    const finishTime = Date.now();
    [...modalTeamA, ...modalTeamB].forEach(p => {
      
      gamesPlayedRef.current[p.id] = (gamesPlayedRef.current[p.id] || 0) + 1;
    });
    // Update Open Level gender streak
    if (matchMode === 'Open Level') {
      const fCount = [...modalTeamA, ...modalTeamB].filter(p => p.gender === 'F').length;
      const isMixed = fCount === 2;
      olSameGenderStreak.current = isMixed ? 0 : olSameGenderStreak.current + 1;
    }

    const returningPlayers = [...modalTeamA, ...modalTeamB];

    const newHistEntry = {
      id: Date.now(), courtId, teamA: modalTeamA, teamB: modalTeamB,
      scoreA: sA, scoreB: sB, winner, duration,
      time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
    };
    const updatedHistory = [...history, newHistEntry];

    // Recompute playerStats with this game included
    const updatedStats = {};
    updatedHistory.forEach(g => {
      const all = [...g.teamA.map(p => ({...p, team:'A'})), ...g.teamB.map(p => ({...p, team:'B'}))];
      all.forEach(({ id, name, level, team }) => {
        if (!updatedStats[id]) updatedStats[id] = { name, level, games: 0, wins: 0 };
        updatedStats[id].games++;
        const won = (team==='A' && g.winner==='A') || (team==='B' && g.winner==='B');
        if (won) updatedStats[id].wins++;
      });
    });

    const updatedQueue = [...queue, ...returningPlayers];

    // Check if any requested game's "all others played" condition is now met.
    // When it is, mark it readyToFire — but do NOT steal a court or skip the queue.
    // The 4 players remain in the queue at their natural positions and will be
    // grouped together by autoAssign when it's genuinely their turn.
    const nowReadyIds = new Set();
    if (matchMode !== 'Manual') {
      for (const req of requestedGames) {
        if (req.readyToFire) continue; // already marked
        const othersDone = Object.entries(req.otherBaselines || {}).every(([id, baseline]) => {
          return (updatedStats[id]?.games || 0) > baseline;
        });
        if (othersDone) nowReadyIds.add(req.id);
      }
    }

    setHistory(updatedHistory);
    setQueue(updatedQueue);
    setCourts(prev => prev.map(c => c.id === courtId ? { ...c, players: null, startTime: null } : c));
    setScoreModal(null);

    if (nowReadyIds.size > 0) {
      setRequestedGames(prev => prev.map(r =>
        nowReadyIds.has(r.id) ? { ...r, readyToFire: true } : r
      ));
      showNotif(`Court ${courtId} — Game recorded! 🎯 Requested game is now ready — fires when these players reach the front of the queue.`);
    } else {
      showNotif(`Court ${courtId} — Game recorded!`);
    }

    // Auto-save after every game
    setTimeout(() => {
      const snap = { ...buildSnapshot(), name: sessionName };
      const updated = savedSessions.filter(s => s.name !== snap.name).concat(snap);
      setSavedSessions(updated);
      localStorage.setItem('dr_saved_sessions', JSON.stringify(updated));
      localStorage.setItem('dr_current_session_name', JSON.stringify(snap.name));
      localStorage.setItem('dr_session_started', sessionStarted);
      setLastSaved(new Date());
    }, 0);
  };

  const addPlayer = () => {
    if (!newName.trim()) return;
    // Check for duplicate name in queue
    const allCurrentNames = new Set([
      ...queue.map(p => p.name.toLowerCase()),
      ...courts.flatMap(c => c.players ? [...c.players.teamA, ...c.players.teamB].map(p => p.name.toLowerCase()) : [])
    ]);
    if (allCurrentNames.has(newName.trim().toLowerCase())) {
      showNotif(`"${newName.trim()}" is already in the session`); return;
    }
    if (addingPair) {
      if (!newPartnerName.trim()) { showNotif('Enter partner name too'); return; }
      if (allCurrentNames.has(newPartnerName.trim().toLowerCase())) {
        showNotif(`"${newPartnerName.trim()}" is already in the session`); return;
      }
      if (newName.trim().toLowerCase() === newPartnerName.trim().toLowerCase()) {
        showNotif('Partner must have a different name'); return;
      }
      const id1 = uid(), id2 = uid();
      const p1 = { id: id1, name: newName.trim(), level: newLevel, gender: newGender, partnerId: id2 };
      const p2 = { id: id2, name: newPartnerName.trim(), level: newPartnerLevel, gender: newPartnerGender, partnerId: id1 };
      // Record join round for late-arrival fairness (only set once, never overwritten)
      if (joinRoundRef.current[id1] === undefined) joinRoundRef.current[id1] = roundsFiredRef.current;
      if (joinRoundRef.current[id2] === undefined) joinRoundRef.current[id2] = roundsFiredRef.current;
      setQueue(prev => [...prev, p1, p2]);
      setPlayerList(prev => {
        const names = new Set(prev.map(p => p.name.toLowerCase()));
        const toAdd = [p1, p2].filter(p => !names.has(p.name.toLowerCase()));
        return [...prev, ...toAdd];
      });
      setNewName(''); setNewPartnerName('');
      showNotif(`${p1.name} & ${p2.name} added as a fixed pair!`);
    } else {
      const p = { id: uid(), name: newName.trim(), level: newLevel, gender: newGender, partnerId: null };
      // Record join round for late-arrival fairness (only set once, never overwritten)
      if (joinRoundRef.current[p.id] === undefined) joinRoundRef.current[p.id] = roundsFiredRef.current;
      setQueue(prev => [...prev, p]);
      setPlayerList(prev => {
        if (prev.some(x => x.name.toLowerCase() === p.name.toLowerCase())) return prev;
        return [...prev, p];
      });
      setNewName('');
      showNotif(`${p.name} added to waitlist!`);
    }
  };

  // Unlink a fixed pair (e.g. if one is removed)
  const removeFromQueue = (id) => {
    setQueue(prev => {
      const target = prev.find(p => p.id === id);
      // If they had a partner, unlink the partner too
      if (target?.partnerId) {
        return prev
          .filter(p => p.id !== id)
          .map(p => p.id === target.partnerId ? { ...p, partnerId: null } : p);
      }
      return prev.filter(p => p.id !== id);
    });
  };

  const exportWaitlistXLSX = () => {
    if (!window.XLSX) { showNotif('Excel library not loaded yet, try again'); return; }
    const rows = queue.map((p, i) => {
      const partner = p.partnerId ? queue.find(x => x.id === p.partnerId) : null;
      return {
        '#': i + 1,
        Name: p.name,
        Level: p.level,
        Gender: p.gender === 'M' ? 'Male' : 'Female',
        'Fixed Partner': partner ? partner.name : '',
        'Games Played': playerStats[p.id]?.games || 0,
      };
    });
    const ws = window.XLSX.utils.json_to_sheet(rows);
    // Column widths
    ws['!cols'] = [{ wch: 4 }, { wch: 20 }, { wch: 14 }, { wch: 8 }, { wch: 20 }, { wch: 12 }];
    const wb = window.XLSX.utils.book_new();
    window.XLSX.utils.book_append_sheet(wb, ws, 'Waitlist');
    const date = new Date().toISOString().slice(0, 10);
    window.XLSX.writeFile(wb, `waitlist_${date}.xlsx`);
    showNotif(`Exported ${rows.length} players to Excel!`);
  };

  const importWaitlistXLSX = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    if (!window.XLSX) { showNotif('Excel library not loaded yet, try again'); return; }
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb = window.XLSX.read(ev.target.result, { type: 'binary' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = window.XLSX.utils.sheet_to_json(ws);
        if (!rows.length) { showNotif('No data found in file'); return; }

        // Build a name→id map for resolving fixed partners
        const nameToId = {};
        const newPlayers = rows.map(row => {
          const id = uid();
          const name = (row['Name'] || row['name'] || '').toString().trim();
          if (name) nameToId[name.toLowerCase()] = id;
          return {
            id,
            name: name || 'Unknown',
            level: LEVELS.includes(row['Level'] || row['level']) ? (row['Level'] || row['level']) : 'Beginner',
            gender: (row['Gender'] || row['gender'] || '').toString().toLowerCase().startsWith('f') ? 'F' : 'M',
            _partnerName: (row['Fixed Partner'] || row['fixed partner'] || '').toString().trim().toLowerCase(),
            partnerId: null,
          };
        }).filter(p => p.name && p.name !== 'Unknown');

        // Resolve partner links by name
        newPlayers.forEach(p => {
          if (p._partnerName) {
            const partnerId = nameToId[p._partnerName];
            if (partnerId) p.partnerId = partnerId;
          }
          delete p._partnerName;
        });

        setQueue(prev => {
          // Avoid duplicates by name (case-insensitive)
          const existingNames = new Set(prev.map(p => p.name.toLowerCase()));
          const fresh = newPlayers.filter(p => !existingNames.has(p.name.toLowerCase()));
          // Record join round for each newly added player
          fresh.forEach(p => { if (joinRoundRef.current[p.id] === undefined) joinRoundRef.current[p.id] = roundsFiredRef.current; });
          return [...prev, ...fresh];
        });
        // Also add to master playerList
        setPlayerList(prev => {
          const existingNames = new Set(prev.map(p => p.name.toLowerCase()));
          const fresh = newPlayers.filter(p => !existingNames.has(p.name.toLowerCase()));
          return [...prev, ...fresh];
        });
        showNotif(`Imported ${newPlayers.length} players from Excel!`);
      } catch (err) {
        showNotif('Failed to read file — check format');
      }
    };
    reader.readAsBinaryString(file);
    // Reset input so the same file can be re-imported
    e.target.value = '';
  };

  const renamePlayer = (id, newName) => {
    const trimmed = newName.trim();
    if (!trimmed) return;
    setQueue(prev => prev.map(p => p.id === id ? { ...p, name: trimmed, level: editingPlayerLevel } : p));
    setEditingPlayerId(null);
    setEditingPlayerName('');
    setEditingPlayerLevel('Beginner');
    showNotif(`Player updated to "${trimmed}"`);
  };

  // Stats
  const activeCourts = courts.filter(c => c.players).length;
  const openCourts = courts.filter(c => !c.players).length;
  const onCourtCount = activeCourts * 4;

  const playerStats = {};
  history.forEach(g => {
    const all = [...g.teamA.map(p => ({...p, team:'A'})), ...g.teamB.map(p => ({...p, team:'B'}))];
    all.forEach(({ id, name, level, gender, team }) => {
      if (!playerStats[id]) playerStats[id] = { name, level, gender, games: 0, wins: 0, pts: 0, against: 0 };
      playerStats[id].games++;
      const won = (team==='A' && g.winner==='A') || (team==='B' && g.winner==='B');
      if (won) playerStats[id].wins++;
      playerStats[id].pts += team === 'A' ? g.scoreA : g.scoreB;
      playerStats[id].against += team === 'A' ? g.scoreB : g.scoreA;
    });
  });

  const exportHistoryCSV = () => {
    const headers = ['#','Time','Court','Team A Players','Team A Levels','Score A','Score B','Team B Players','Team B Levels','Winner','Duration (min)'];
    const rows = [...history].reverse().map((g, i) => [
      history.length - i,
      g.time,
      `Court ${g.courtId}`,
      g.teamA.map(p => p.name).join(' & '),
      g.teamA.map(p => p.level).join(' & '),
      g.scoreA,
      g.scoreB,
      g.teamB.map(p => p.name).join(' & '),
      g.teamB.map(p => p.level).join(' & '),
      g.winner === 'tie' ? 'Tie' : `Team ${g.winner}`,
      g.duration
    ]);
    const csv = [headers, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = `dink_republic_history_${new Date().toISOString().slice(0,10)}.csv`;
    a.click(); URL.revokeObjectURL(url);
    showNotif('History exported to CSV!');
  };

  const exportStatsCSV = () => {
    const headers = ['Rank','Player','Level','Games','Wins','Losses','Win %','Points For','Points Against','Diff'];
    const rows = Object.entries(playerStats)
      .sort((a,b) => b[1].wins - a[1].wins || b[1].games - a[1].games)
      .map(([, s], i) => {
        const losses = s.games - s.wins;
        const winPct = s.games ? Math.round(s.wins / s.games * 100) : 0;
        const diff = s.pts - s.against;
        return [i+1, s.name, s.level, s.games, s.wins, losses, `${winPct}%`, s.pts, s.against, diff >= 0 ? `+${diff}` : diff];
      });
    const csv = [headers, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url;
    a.download = `dink_republic_stats_${new Date().toISOString().slice(0,10)}.csv`;
    a.click(); URL.revokeObjectURL(url);
    showNotif('Player stats exported to CSV!');
  };

  return (
    <div className="app">
      {notification && <div className="notification">✓ {notification}</div>}

      <div className="header">
        <h1>🏓 DINK Republic Open Play</h1>
        <p>Court Manager · Doubles Open Play System</p>
      </div>

      {/* SESSION BAR */}
      <div className="session-bar">
        <div className="session-info">
          <span style={{fontSize:16}}>📋</span>
          <div>
            <div className="session-name">{sessionName}</div>
            <div className="session-meta">
              Started {new Date(sessionStarted).toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}
              {lastSaved && <> · Saved {lastSaved.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</>}
            </div>
          </div>
        </div>
        <div className="session-actions">
          <button className="btn btn-ghost btn-sm" onClick={() => setSessionModal('load')} title="Load a saved session">📂 Load</button>
          <button className="btn btn-teal btn-sm" onClick={() => saveSession()} title="Save current session">💾 Save</button>
          <button className="btn btn-gold btn-sm" onClick={() => { setNewSessionName(''); setSessionModal('new'); }} title="Start a fresh session">＋ New Session</button>
          <button className="btn btn-sm" onClick={openPreviewWindow} title="Open TV/display preview in a new window" style={{background:'#7c3aed',color:'#fff',border:'none'}}>📺 Preview Screen</button>
          <label style={{display:'flex',alignItems:'center',gap:5,cursor:'pointer',fontSize:12,fontWeight:600,color:autoAlert?'var(--gold)':'var(--text-muted)',background:autoAlert?'var(--gold-dim)':'var(--surface3)',border:`1px solid ${autoAlert?'#ffd60055':'var(--border)'}`,borderRadius:6,padding:'5px 10px',transition:'all 0.15s',whiteSpace:'nowrap'}} title="Show a popup with player names whenever a game starts">
            <input type="checkbox" checked={autoAlert} onChange={e => setAutoAlert(e.target.checked)} style={{accentColor:'var(--gold)',width:13,height:13,cursor:'pointer'}} />
            🔔 Auto Alert
          </label>
          <label style={{display:'flex',alignItems:'center',gap:5,cursor:'pointer',fontSize:12,fontWeight:600,color:scoringEnabled?'var(--green)':'var(--text-muted)',background:scoringEnabled?'var(--green-dim)':'var(--surface3)',border:`1px solid ${scoringEnabled?'#00c85355':'var(--border)'}`,borderRadius:6,padding:'5px 10px',transition:'all 0.15s',whiteSpace:'nowrap'}} title="When enabled, prompts for score entry when a match ends">
            <input type="checkbox" checked={scoringEnabled} onChange={e => setScoringEnabled(e.target.checked)} style={{accentColor:'var(--green)',width:13,height:13,cursor:'pointer'}} />
            🏆 Scoring
          </label>
          <label style={{display:'flex',alignItems:'center',gap:5,cursor:'pointer',fontSize:12,fontWeight:600,color:showUpNext?'var(--blue)':'var(--text-muted)',background:showUpNext?'var(--blue-dim)':'var(--surface3)',border:`1px solid ${showUpNext?'var(--blue)':'var(--border)'}`,borderRadius:6,padding:'5px 10px',transition:'all 0.15s',whiteSpace:'nowrap'}} title="Preview the next matches from the queue">
            <input type="checkbox" checked={showUpNext} onChange={e => setShowUpNext(e.target.checked)} style={{accentColor:'var(--blue)',width:13,height:13,cursor:'pointer'}} />
            👁 Up Next
          </label>
        </div>
      </div>

      {/* SUMMARY STATS */}
      <div className="stat-grid">
        <div className="stat-card">
          <div className="val" style={{color:'var(--gold)'}}>{queue.length}</div>
          <div className="lbl">In Queue</div>
        </div>
        <div className="stat-card">
          <div className="val" style={{color:'var(--green)'}}>{onCourtCount}</div>
          <div className="lbl">On Court</div>
        </div>
        <div className="stat-card">
          <div className="val" style={{color:'var(--blue)'}}>{openCourts}</div>
          <div className="lbl">Open Courts</div>
        </div>
        <div className="stat-card">
          <div className="val" style={{color:'var(--teal)'}}>{history.length}</div>
          <div className="lbl">Games Done</div>
        </div>
      </div>

      {/* CONTROLS */}
      <div className="controls-bar">
        <div className="ctrl-group">
          <span className="ctrl-label">Courts</span>
          {[1,2,3,4,5,6,7].map(n => (
            <button key={n} className={`time-btn ${numCourts===n?'active':''}`} onClick={() => updateCourts(n)}>{n}</button>
          ))}
        </div>
        <div className="divider-v" />
        <div className="ctrl-group">
          <span className="ctrl-label">Time Limit</span>
          {TIME_OPTIONS.map(t => (
            <button key={t} className={`time-btn ${gameTime===t?'active':''}`} onClick={() => setGameTime(t)}>{t}m</button>
          ))}
        </div>
        <div className="divider-v" />
        <div className="ctrl-group">
          <span className="ctrl-label">Match Mode</span>
          {MATCH_MODES.map(m => (
            <button key={m} className={`mode-btn ${matchMode===m?'active':''}`} onClick={() => setMatchMode(m)}>{m}</button>
          ))}
        </div>
        <button className="btn btn-green btn-sm" style={{marginLeft:'auto'}} onClick={autoAssign}>▶ Auto Assign</button>
        <button className="btn btn-sm" style={{background:'#7c3aed',color:'#fff'}} onClick={() => { setSimGames('96'); setSimModal(true); }} title="Run automated game simulation">🧪 Test Sim</button>
      </div>

      {/* TABS */}
      <div className="tabbar">
        {[
          ['courts', `Courts (${numCourts})`],
          ['queue', `Waitlist (${queue.length})`],
          ['playerlist', `Player List (${playerList.length})`],
          ['requests', `Requested (${requestedGames.length})`],
          ['history', `History (${history.length})`],
          ['stats', 'Player Stats'],
        ].map(([key, label]) => (
          <div key={key} className={`tab ${activeTab===key?'active':''}`} onClick={() => setActiveTab(key)}>{label}</div>
        ))}
      </div>

      {/* COURTS TAB */}
      {activeTab === 'courts' && (
        <div className="courts-grid">
          {courts.map(court => (
